function genId() { return Math.random().toString(36).slice(2, 10); }
function pad(n) { return String(n).padStart(2, "0"); }
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}
function dateFromStr(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function addDays(dateStr, n) {
  const d = dateFromStr(dateStr);

}
function formatDateLabel(dateStr) {

}
// Home-tab-only date label: same format but with a Korean weekday character.
function formatDateLabelKR(dateStr) {

}
// Breaks a date into the pieces used by the large Home-tab date display.
function formatBigDate(dateStr) {
  const d = dateFromStr(dateStr);
  return {
    year: d.getFullYear(),
    month: pad(d.getMonth() + 1),
    day: pad(d.getDate()),
    weekday: DAYS_FULL[d.getDay()],

}
function timeToMin(h, m) { return h * 60 + m; }
// Sorts todos within a category: timed todos first (earliest start time
// first), untimed todos after, preserving manual drag order (_catOrder)
// as a tiebreaker among todos that share the same timed/untimed status.
function compareTodoOrder(a, b) {
  if (a.hasTime && b.hasTime) {
    const ta = timeToMin(a.startH, a.startM), tb = timeToMin(b.startH, b.startM);
    if (ta !== tb) return ta - tb;
    return (a._catOrder ?? 0) - (b._catOrder ?? 0);
  }
  if (a.hasTime !== b.hasTime) return a.hasTime ? -1 : 1;
  return (a._catOrder ?? 0) - (b._catOrder ?? 0);
}
// Whether a repeating todo occurs on the given date (same rule used for
// building each day's todo list).
function repeatMatchesDate(t, dateStr) {
  if (!t.repeat) return false;
  if (t.createdDate && dateStr < t.createdDate) return false;
  const d = dateFromStr(dateStr);
  return t.repeat.days?.includes(d.getDay()) && (!t.repeat.dates?.length || dateStr <= t.repeat.dates[0]);
}
// The manual drag-order value to sort a todo by on a given date. Repeating
// todos keep a per-date order (`repeatOrder[dateStr]`) instead of a single
// `_catOrder`, so dragging one only changes its position on that specific
// day — the recurring todo's order on every other day is unaffected.
function effectiveCatOrder(t, dateStr) {
  if (t.repeat) return t.repeatOrder?.[dateStr] ?? 0;
  return t._catOrder ?? 0;
}
// Computes an order value that sits between two neighbors (or past an
// open end when one side is missing). Used so that dropping/completing
// a todo only ever changes *its own* order value — every other todo's
// order is left untouched — instead of renumbering a whole bucket (e.g.
// "just the undone list" or "just the done list") with fresh local
// indices. That local renumbering used to stomp on the single shared
// order scale that both the undone and done lists read from, so a todo
// completed after such a renumbering could land in a seemingly random
// spot among the other completed todos instead of keeping the position
// it actually had.
function orderBetween(before, after) {
  if (before == null && after == null) return 0;
  if (before == null) return after - 10;
  if (after == null) return before + 10;
  return (before + after) / 2;
}

const _rgbaCache = {};
function hexToRgba(hex, alpha) {
  const key = hex + alpha;
  if (_rgbaCache[key]) return _rgbaCache[key];
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return (_rgbaCache[key] = `rgba(${r},${g},${b},${alpha})`);
}

// ─── Sync status indicator ─────────────────────────────────────────
// Small colored dot shown next to the Settings button so the user can see

function haptic(pattern = [10]) {

function mixHex(hex1, hex2, ratio = 0.5) {
  const r1 = parseInt(hex1.slice(1, 3), 16), g1 = parseInt(hex1.slice(3, 5), 16), b1 = parseInt(hex1.slice(5, 7), 16);
  const r2 = parseInt(hex2.slice(1, 3), 16), g2 = parseInt(hex2.slice(3, 5), 16), b2 = parseInt(hex2.slice(5, 7), 16);
  const r = Math.round(r1 + (r2 - r1) * ratio);
  const g = Math.round(g1 + (g2 - g1) * ratio);
  const b = Math.round(b1 + (b2 - b1) * ratio);
  return `#${[r, g, b].map(v => v.toString(16).padStart(2, "0")).join("")}`;
}

  } catch {

// True if a data snapshot actually has something in it worth protecting.
// Used to (a) decide whether to write a safety backup, and (b) refuse to
// let an empty/near-empty remote or backup snapshot silently replace real
// local data.
function hasRealData(todosStore, categories) {
  const t = todosStore || {};
  const dateCount = t.dates ? Object.values(t.dates).reduce((n, arr) => n + (Array.isArray(arr) ? arr.length : 0), 0) : 0;
  const repeatCount = Array.isArray(t.repeat) ? t.repeat.length : 0;
  const catCount = Array.isArray(categories) ? categories.length : 0;
  return (dateCount + repeatCount + catCount) > 0;
}

// NOTE: This used to wipe all locally-cached app data on every page load
// whenever a sync URL was set, on the assumption that the Google Sheet
// would always be re-pulled successfully right after mount. In practice,
// if that pull was slow, failed, or lost a race against the debounced
// auto-push (see below), the wipe caused total data loss with no way to
// recover. Local data is now always kept as a safety net; pullFromCloud's
// own version check (remote.updatedAt > localVersionRef.current) is what
// decides whether the cloud copy should replace it.

// ─── useHoldRepeat: press and hold to auto-repeat ─────────────────────
// A short tap runs the callback once. Holding past a threshold (delay)
// triggers repeated calls at the `interval`. Releasing or moving
// the pointer outside the button stops it immediately.
function useHoldRepeat(callback, { delay = 350, interval = 80 } = {}) {
  const timeoutRef = useRef(null);
  const intervalRef = useRef(null);
  const callbackRef = useRef(callback);
  callbackRef.current = callback;

  const stop = useCallback(() => {
    if (timeoutRef.current) { clearTimeout(timeoutRef.current); timeoutRef.current = null; }
    if (intervalRef.current) { clearInterval(intervalRef.current); intervalRef.current = null; }
  }, []);

  const start = useCallback((e) => {
    if (e.cancelable) e.preventDefault();
    stop();
    callbackRef.current();
    timeoutRef.current = setTimeout(() => {
      intervalRef.current = setInterval(() => {
        callbackRef.current();
      }, interval);
    }, delay);
  }, [delay, interval, stop]);

  useEffect(() => () => stop(), [stop]);

  return {
    onPointerDown: start,
    onPointerUp: stop,
    onPointerLeave: stop,
    onPointerCancel: stop,
    onContextMenu: (e) => e.preventDefault(),
  };
}

// ─── TimePicker ──────────────────────────────────────────────────
function TimePicker({ hour, minute, onChange }) {
  // Direct numeric entry only. While a field is focused it shows exactly
  // what's been typed so far (draft state) rather than the padded
  // `hour`/`minute` prop, so typing "9" doesn't get reformatted
  // mid-keystroke. On blur/Enter it's clamped to a valid range and
  // committed via onChange.
  const [hourDraft, setHourDraft] = useState(null); // null = not editing
  const [minuteDraft, setMinuteDraft] = useState(null);
  const minuteInputRef = useRef(null);

  function commitHour(v) {
    const n = v === "" ? hour : Math.max(0, Math.min(23, parseInt(v, 10) || 0));
    onChange(n, minute);
    setHourDraft(null);
  }
  function commitMinute(v) {
    const n = v === "" ? minute : Math.max(0, Math.min(59, parseInt(v, 10) || 0));
    onChange(hour, n);
    setMinuteDraft(null);
  }
  // Once two digits have been typed for the hour, there's nothing more to
  // enter there, so commit it and jump straight to the minute field —
  // mirrors how native date/time inputs auto-advance between segments.
  function handleHourChange(e) {
    const cleaned = e.target.value.replace(/[^0-9]/g, "").slice(0, 2);
    setHourDraft(cleaned);
    if (cleaned.length === 2) {
      commitHour(cleaned);
      minuteInputRef.current?.focus();
      minuteInputRef.current?.select();
    }
  }

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, userSelect: "none" }}>
      <input
        type="text" inputMode="numeric" pattern="[0-9]*" maxLength={2}

        ref={minuteInputRef}

// ─── Android/phone back-button integration ──────────────────────
// Every modal / bottom sheet / full-screen overlay pushes a history
// entry while it's open, so pressing the phone's back button closes
// it instead of exiting the whole app. Nested layers (a sheet opened
// on top of another sheet, or a sub-screen inside a full-screen
// overlay) each push their own entry, so back closes them one at a
// time in the right order (last opened, first closed).
const __ondotModalStack = [];
// `history.back()` is asynchronous: its popstate can arrive *after* a
// subsequent synchronous pushState (e.g. closing an action-menu sheet
// and immediately opening an edit sheet). When that happens, the
// delayed popstate ends up popping the *newly opened* sheet instead of
// the one that was actually closing, which makes the new sheet flash
// open then instantly close. To avoid this we track how many back()
// calls are still "in flight" and queue any new pushes until all of
// them have been confirmed via their popstate.
let __ondotBackPending = 0;
const __ondotPendingPushes = [];
window.addEventListener("popstate", () => {
  if (__ondotBackPending > 0) __ondotBackPending--;
  const top = __ondotModalStack.pop();
  if (top) {
    top.viaPopstate = true;
    top.onClose();
  }
  if (__ondotBackPending === 0 && __ondotPendingPushes.length) {
    const next = __ondotPendingPushes.shift();
    next();
  }
});
function useBackClose(open, onClose) {
  const wasOpenRef = useRef(false);
  const entryRef = useRef(null);
  const onCloseRef = useRef(onClose);
  onCloseRef.current = onClose;

  useEffect(() => {
    if (open && !wasOpenRef.current) {
      // Just opened: claim a spot in the browser history stack.
      const doPush = () => {
        const entry = { onClose: () => onCloseRef.current(), viaPopstate: false };
        entryRef.current = entry;
        __ondotModalStack.push(entry);
        window.history.pushState({ ondotModal: true }, "");
      };
      if (__ondotBackPending > 0) {
        // A previous sheet's close is still being consumed by the
        // browser; wait for its popstate before pushing ours so the
        // two navigations can't be reordered/misattributed.
        __ondotPendingPushes.push(doPush);
      } else {
        doPush();
      }
    } else if (!open && wasOpenRef.current) {
      // Just closed: release our spot.
      const entry = entryRef.current;
      const idx = __ondotModalStack.indexOf(entry);
      if (idx !== -1) __ondotModalStack.splice(idx, 1);
      // If we closed via a UI action (not the back button), consume
      // the history entry we pushed so back-stack doesn't pile up.
      if (entry && !entry.viaPopstate) {
        __ondotBackPending++;
        window.history.back();
      }
      entryRef.current = null;
    }
    wasOpenRef.current = open;
  }, [open]);
}

// ─── BottomSheet ─────────────────────────────────────────────────
function BottomSheet({ open, onClose, children, title, dimmed = false }) {
  const ref = useRef();
  const [keyboardOffset, setKeyboardOffset] = useState(0);
  useBackClose(open, onClose);
  const [entered, setEntered] = useState(false);
  // Guards against a "ghost" click/tap that lands on the backdrop the
  // instant it mounts (e.g. a touch device firing a synthetic click right
  // after the touchend that opened this sheet) from closing it immediately.
  const openedAtRef = useRef(0);
  useEffect(() => { if (open) openedAtRef.current = Date.now(); }, [open]);
  const handleBackdropClick = () => {
    if (Date.now() - openedAtRef.current < 300) return;
    onClose();
  };

  useEffect(() => { if (open && ref.current) ref.current.scrollTop = 0; }, [open]);

  useEffect(() => {
    if (!open) { setEntered(false); return; }
    setEntered(false);
    const id = requestAnimationFrame(() => {
      requestAnimationFrame(() => setEntered(true));
    });
    return () => cancelAnimationFrame(id);
  }, [open]);

  useEffect(() => {
    if (!open) return;
    const vv = window.visualViewport;
    if (!vv) return;
    function onResize() {
      const offset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      setKeyboardOffset(offset);
    }
    vv.addEventListener("resize", onResize);
    vv.addEventListener("scroll", onResize);
    onResize();
    return () => {
      vv.removeEventListener("resize", onResize);
      vv.removeEventListener("scroll", onResize);
      setKeyboardOffset(0);
    };
  }, [open]);

  if (!open) return null;
  return ReactDOM.createPortal(
    <>
      <div onClick={handleBackdropClick} style={{
        position: "fixed", inset: 0, zIndex: 200,
        background: "rgba(0,0,0,0.25)",
        opacity: entered ? 1 : 0, transition: "opacity 0.32s cubic-bezier(0.32,0.72,0,1)",
      }} />
      <div style={{
        position: "fixed", left: 0, right: 0, bottom: 0, zIndex: 201,
        display: "flex", flexDirection: "column",
        pointerEvents: "none",
      }}>
        <div ref={ref} onTouchMove={e => e.stopPropagation()} style={{
          background: "#fff", borderRadius: `${RADIUS_LG}px ${RADIUS_LG}px 0 0`,
          padding: "0 0 env(safe-area-inset-bottom,16px) 0",
          maxHeight: keyboardOffset > 0
            ? `calc(100vh - ${keyboardOffset}px - 12px)`
            : "88vh",
          overflowY: "auto", overflowX: "hidden",
          WebkitOverflowScrolling: "touch", touchAction: "pan-y",
          boxShadow: "0 -4px 24px rgba(0,0,0,0.10)",
          transform: `translateY(${entered ? -keyboardOffset + "px" : "100%"}) scale(${dimmed ? 0.96 : 1})`,
          transformOrigin: "top center",
          filter: dimmed ? "brightness(0.92)" : "none",
          transition: entered
            ? "transform 0.28s cubic-bezier(0.32,0.72,0,1), filter 0.28s ease-out"
            : "none",
          pointerEvents: dimmed ? "none" : "auto",
        }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "18px 20px 10px" }}>
            <span style={{ fontWeight: 700, fontSize: 17 }}>{title}</span>
            <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "#888", lineHeight: 1 }}>×</button>
          </div>
          <div style={{ padding: "0 20px 20px" }}>{children}</div>
        </div>
      </div>
    </>,
    document.body
  );
}

function AlbumScreen({ open, onClose, onSelect, revealedCounts, selectedName, onDeselect }) {
  const [entered, setEntered] = useState(false);
  const [openFolder, setOpenFolder] = useState(null);
  useBackClose(open, onClose);

          onClick={() => (openFolder ? setOpenFolder(null) : onClose())}

            cursor: "pointer", WebkitTapHighlightColor: "transparent",

            <path d="M11 7l-5 5 5 5" stroke="#111" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
        </button>
        <div style={{ fontSize: 16, fontWeight: 700, color: "#111" }}>{openFolder || "앨범"}</div>
      </div>
      {openFolder ? (
        openFolder === "바다" ? (
          <div style={{
            flex: 1, minHeight: 0, overflowY: "auto", WebkitOverflowScrolling: "touch",
            overscrollBehavior: "contain", padding: 16,
            display: "grid", gridTemplateColumns: "repeat(3, 1fr)",
            gap: 10, alignContent: "start", justifyItems: "start",
          }}>
            {ALBUM_PHOTOS["바다"].map((photo, i) => (
              photo ? (() => {
                const revealed = revealedCounts?.[photo.name] || 0;
                const isSelected = selectedName === photo.name;
                const total = totalCellCountFromName(photo.name);
                const title = photo.name.replace(/\s*\(\d+\)\s*$/, "");
                return (
                  <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, width: "100%" }}>
                    <PixelRevealCanvas
                      src={photo.src}
                      revealedCount={revealed}
                      style={{ width: "100%", maxWidth: 96 }}
                    />
                    <span style={{ fontSize: 12, color: "#666", textAlign: "center" }}>{title}</span>
                    <span style={{ fontSize: 11, color: "#aaa", textAlign: "center" }}>
                      ({revealed}/{total ?? "?"})
                    </span>
                    {isSelected ? (
                      <button
                        onClick={() => onDeselect && onDeselect()}
                        style={{
                          fontSize: 11, fontWeight: 600, color: "#B5473B",
                          padding: "4px 10px", borderRadius: 999, border: "1px solid #eecfcb",
                          background: "#fff5f4", cursor: "pointer", WebkitTapHighlightColor: "transparent",
                        }}>
                        취소
                      </button>
                    ) : (
                      <button
                        onClick={() => onSelect && onSelect(photo)}
                        style={{
                          fontSize: 11, fontWeight: 600, color: "#111",
                          padding: "4px 10px", borderRadius: 999, border: "1px solid #ddd",
                          background: "#fafafa", cursor: "pointer", WebkitTapHighlightColor: "transparent",

                );
              })() : (
                <div key={i} />

            ))}
          </div>
        ) : (
          <div style={{
            flex: 1, minHeight: 0, display: "flex",
            alignItems: "center", justifyContent: "center",
          }}>
            <span style={{ fontSize: 13, color: "#999" }}>아직 사진이 없습니다.</span>
          </div>
        )
      ) : (
        <div style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: 16, display: "flex", flexDirection: "column", gap: 8 }}>
          {ALBUM_FOLDERS.map(name => (
            <button key={name} onClick={() => setOpenFolder(name)} style={{
              display: "flex", alignItems: "center", gap: 10,
              padding: "14px 16px", borderRadius: RADIUS_MD, border: "none", textAlign: "left",

    </div>

}

// ─── PixelRevealCanvas ──────────────────────────────────────────────
// Renders a pixel-art image mostly in grayscale, except for the first
// `revealedCount` opaque "pixel-art pixels" (each a PIXEL_ART_CELL x
// PIXEL_ART_CELL block of real image pixels), which are drawn in their
// original color. Cells are revealed in raster order — row by row from
// the top, left to right within each row — matching the same order/unit
// used to count each item's total pixel count (shown in its album name).
const PIXEL_ART_CELL = 6;

function PixelRevealCanvas({ src, revealedCount, width = 160, style }) {
  const canvasRef = useRef(null);
  const dataRef = useRef(null); // { w, h, cellW, cellH, cellOrder: [{cx,cy}], orig: ImageData, gray: ImageData }

  // (Re)build the original + grayscale pixel buffers whenever the image changes.
  useEffect(() => {
    let cancelled = false;
    const img = new Image();
    img.onload = () => {
      if (cancelled) return;
      const w = img.naturalWidth, h = img.naturalHeight;
      const off = document.createElement("canvas");
      off.width = w; off.height = h;
      const octx = off.getContext("2d");
      octx.drawImage(img, 0, 0);
      const orig = octx.getImageData(0, 0, w, h);
      const gray = octx.createImageData(w, h);
      for (let i = 0; i < orig.data.length; i += 4) {
        const r = orig.data[i], g = orig.data[i + 1], b = orig.data[i + 2], a = orig.data[i + 3];
        const lum = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
        gray.data[i] = lum; gray.data[i + 1] = lum; gray.data[i + 2] = lum; gray.data[i + 3] = a;
      }
      // Build the raster-order list of opaque cells (sampling each cell's
      // top-left pixel, same method used to compute each item's pixel count).
      const cols = Math.floor(w / PIXEL_ART_CELL), rows = Math.floor(h / PIXEL_ART_CELL);
      const cellOrder = [];
      for (let cy = 0; cy < rows; cy++) {
        for (let cx = 0; cx < cols; cx++) {
          const px = cx * PIXEL_ART_CELL, py = cy * PIXEL_ART_CELL;
          const alpha = orig.data[(py * w + px) * 4 + 3];
          if (alpha > 0) cellOrder.push({ cx, cy });
        }
      }
      dataRef.current = { w, h, cellOrder, orig, gray };
      paint();
    };
    img.src = src;
    return () => { cancelled = true; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [src]);

  function paint() {
    const d = dataRef.current;
    const canvas = canvasRef.current;
    if (!d || !canvas) return;
    canvas.width = d.w; canvas.height = d.h;
    const ctx = canvas.getContext("2d");
    const composite = ctx.createImageData(d.w, d.h);
    composite.data.set(d.gray.data);
    const revealed = Math.max(0, Math.min(revealedCount, d.cellOrder.length));
    for (let i = 0; i < revealed; i++) {
      const { cx, cy } = d.cellOrder[i];
      for (let y = 0; y < PIXEL_ART_CELL; y++) {
        const py = cy * PIXEL_ART_CELL + y;
        if (py >= d.h) continue;
        for (let x = 0; x < PIXEL_ART_CELL; x++) {
          const px = cx * PIXEL_ART_CELL + x;
          if (px >= d.w) continue;
          const idx = (py * d.w + px) * 4;
          composite.data[idx] = d.orig.data[idx];
          composite.data[idx + 1] = d.orig.data[idx + 1];
          composite.data[idx + 2] = d.orig.data[idx + 2];
          composite.data[idx + 3] = d.orig.data[idx + 3];
        }
      }
    }
    ctx.putImageData(composite, 0, 0);
  }

  useEffect(() => { paint(); }, [revealedCount]);

  return (
    <canvas
      ref={canvasRef}
      style={{ width, height: "auto", imageRendering: "pixelated", display: "block", ...style }}
    />
  );
}

function totalCellCountFromName(name) {
  // Reads the pixel count already shown in parentheses in the item's name
  // (e.g. "yellow shell (1034)") so the UI can show "N / total" without
  // waiting for the canvas image to finish decoding.
  const m = /\((\d+)\)/.exec(name || "");
  return m ? parseInt(m[1], 10) : null;
}


// Shows to-dos that have been archived (moved out of the day's list via
// "보관함으로 이동"). Supports restoring a todo back to today, or deleting
// it permanently.
function ArchiveScreen({ open, onClose, todos, setTodos }) {
  const [entered, setEntered] = useState(false);
  const [actionMenu, setActionMenu] = useState(null); // { todo }
  const [editSheet, setEditSheet] = useState(null); // todo being edited
  useBackClose(open, onClose);

  const archivedTodos = useMemo(
    () => (todos || []).filter(t => t.archived),
    [todos]
  );

  const restoreTodo = useCallback((todo) => {
    setTodos(prev => prev.map(t => {
      if (t.id !== todo.id) return t;
      const { archived, ...rest } = t;
      return { ...rest, dates: [...(t.dates || []).filter(d => d !== todayStr()), todayStr()] };
    }));
  }, [setTodos]);

  const deleteForever = useCallback((todo) => {
    setTodos(prev => prev.filter(t => t.id !== todo.id));
  }, [setTodos]);

  const saveEdited = useCallback((todo, data) => {
    setTodos(prev => prev.map(t => t.id === todo.id ? { ...t, ...data } : t));
    setEditSheet(null);
  }, [setTodos]);

  useEffect(() => {
    if (!open) { setEntered(false); return; }
    setEntered(false);
    const id = requestAnimationFrame(() => {
      requestAnimationFrame(() => setEntered(true));
    });
    return () => cancelAnimationFrame(id);
  }, [open]);

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 300,
      background: "#fff",
      display: "flex", flexDirection: "column",
      transform: `translateY(${entered ? "0" : "100%"})`,
      transition: "transform 0.32s cubic-bezier(0.32,0.72,0,1)",
      paddingTop: "env(safe-area-inset-top, 0px)",
    }}>
      <div style={{
        display: "flex", alignItems: "center", gap: 10,
        padding: "14px 16px", borderBottom: "1px solid #f0f0f0", flexShrink: 0,
      }}>
        <button
          onClick={onClose}
          aria-label="닫기"
          style={{
            display: "flex", alignItems: "center", justifyContent: "center",
            border: "none", background: "none", padding: 4, margin: 0,
            cursor: "pointer", WebkitTapHighlightColor: "transparent",

        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H6" stroke="#111" strokeWidth="2" strokeLinecap="round" />
            <path d="M11 7l-5 5 5 5" stroke="#111" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
        </button>
        <div style={{ fontSize: 16, fontWeight: 700, color: "#111" }}>보관함</div>
      </div>
      <div style={{
        flex: 1,
        minHeight: 0,
        overflowY: "auto",
        WebkitOverflowScrolling: "touch",
        overscrollBehaviorY: "contain",
      }}>
        {archivedTodos.length === 0 ? (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%" }}>
            <div style={{ textAlign: "center", color: "#bbb", fontSize: 13, padding: "0 32px" }}>
              보관된 할 일이 없습니다
            </div>
          </div>
        ) : (
          <div style={{ padding: "4px 16px 24px" }}>
            {archivedTodos.map(todo => {
              const cat = CATEGORIES.find(c => c.id === todo.categoryId);
              return (
                <div

                  style={{

                    background: cat?.color || "#ccc",

                    <div style={{
                      fontSize: 14, fontWeight: 600, color: "#222",
                      whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",

                      <div style={{

function repeatDaysLabel(days) {
  if (!days || days.length === 0) return "반복";
  const sorted = [...days].sort((a, b) => a - b);
  if (sorted.length === 7) return "매일";
  return "매주 " + sorted.map(d => DAYS_KR1[d]).join(", ");
}

// ─── MiniCalendar ─────────────────────────────────────────────────
function MiniCalendar({ selectedDates, onToggle }) {
  const [viewDate, setViewDate] = useState(new Date());
  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
        <button onClick={() => setViewDate(new Date(year, month - 1, 1))} style={{ ...arrowBtn, display: "flex", alignItems: "center" }}><IconChevronLeft /></button>
        <span style={{ fontWeight: 700 }}>{year}/{pad(month + 1)}</span>
        <button onClick={() => setViewDate(new Date(year, month + 1, 1))} style={{ ...arrowBtn, display: "flex", alignItems: "center" }}><IconChevronRight /></button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, textAlign: "center", paddingBottom: 4 }}>
        {DAYS_KR1.map((d, i) => (
          <div key={d} style={{ fontSize: 11, color: i === 0 ? "#E07B7B" : i === 6 ? "#7B9EE0" : "#999", padding: "2px 0", fontWeight: 600 }}>{d}</div>
        ))}
        {cells.map((d, i) => {
          if (!d) return <div key={`e${i}`} />;
          const ds = `${year}-${pad(month + 1)}-${pad(d)}`;
          const sel = selectedDates.includes(ds);
          return (
            <div key={ds} onClick={() => onToggle(ds)} style={{
              padding: "5px 0", borderRadius: RADIUS_PILL, cursor: "pointer",
              background: sel ? "#222" : "transparent", color: sel ? "#fff" : "#222", fontSize: 13
            }}>{d}</div>
          );
        })}
      </div>
    </div>
  );
}

// ─── TodoForm ─────────────────────────────────────────────────────
function TodoForm({ initial, onSave, onClose }) {
  const [title, setTitle] = useState(initial?.title || "");
  const titleInputRef = useRef(null);
  // Keeps the title input pinned just above the keyboard: on focus we try
  // right away (covers re-focusing while the keyboard is already up), and
  // we also listen for the visualViewport resize that fires once the
  // keyboard actually finishes opening, since that's when the input's
  // container has its final (shrunk) height and the scroll needs to happen.
  const scrollTitleIntoView = () => {
    requestAnimationFrame(() => {
      titleInputRef.current?.scrollIntoView({ block: "end", behavior: "smooth" });
    });
  };
  useEffect(() => {
    const vv = window.visualViewport;
    if (!vv) return;
    function onResize() {
      if (document.activeElement === titleInputRef.current) scrollTitleIntoView();
    }
    vv.addEventListener("resize", onResize);
    return () => vv.removeEventListener("resize", onResize);
  }, []);
  const [memo, setMemo] = useState(initial?.memo || "");
  const [hasMemo, setHasMemo] = useState(!!(initial?.memo));
  const [catId, setCatId] = useState(initial?.categoryId || null);
  const [important, setImportant] = useState(!!initial?.important);
  const [hasTime, setHasTime] = useState(!!(initial?.hasTime));
  const [startH, setStartH] = useState(initial?.startH ?? 9);
  const [startM, setStartM] = useState(initial?.startM ?? 0);
  const [endH, setEndH] = useState(initial?.endH ?? 10);
  const [endM, setEndM] = useState(initial?.endM ?? 0);
  // 종료 시간은 선택 입력 — "미입력"을 누르면 종료 시간 없이 시작 시간만 저장한다.
  const [hasEndTime, setHasEndTime] = useState(initial ? initial.endH != null : true);
  const [hasRepeat, setHasRepeat] = useState(!!initial?.repeat);
  const [repDays, setRepDays] = useState(initial?.repeat?.days || []);
  const [repDates, setRepDates] = useState(initial?.repeat?.dates || []);
  const toggleRepDay = (i) => setRepDays(prev => prev.includes(i) ? prev.filter(x => x !== i) : [...prev, i]);
  const toggleRepDate = (ds) => setRepDates(prev => prev.includes(ds) ? [] : [ds]);
  const repeatValid = !hasRepeat || (repDates.length > 0 && repDays.length > 0);
  const timeValid = !hasTime || !hasEndTime || (startH * 60 + startM < endH * 60 + endM);
  // "미표시 할일" 카테고리에서는 메모/시간/반복은 그대로 사용하고, 중요 설정만
  // 숨기고, 저장 시에도 이전에 켜져 있던 값이 남아 있지 않도록 무시한다.
  const isUnassigned = catId === "unassigned";
  // 종료 시간이 시작 시간보다 빠르면(자정을 넘기는 경우) 저장 자체는 막지
  // 않고, 대신 "다음 날 종료 시간까지가 맞는지" 한 번 확인받는다.
  const [overnightConfirm, setOvernightConfirm] = useState(false);
  const doSave = () => {
    const effImportant = isUnassigned ? false : important;
    const effHasTime = hasTime;
    onSave({
      title: title.trim(), memo: hasMemo ? memo.trim() : "", categoryId: catId,
      important: effImportant,
      hasTime: effHasTime, startH: effHasTime ? startH : null, startM: effHasTime ? startM : null,
      endH: (effHasTime && hasEndTime) ? endH : null, endM: (effHasTime && hasEndTime) ? endM : null,
      repeat: hasRepeat ? { days: repDays, dates: repDates } : null,
    });
  };
  const save = () => {
    if (!title.trim() || !repeatValid) return;
    if (hasTime && !timeValid) {
      setOvernightConfirm(true);
      return;
    }
    doSave();
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16, userSelect: "none", WebkitUserSelect: "none", MozUserSelect: "none", msUserSelect: "none", WebkitTouchCallout: "none" }}>
      <div>
        <label style={formLabel}>제목 *</label>
        <input ref={titleInputRef} value={title} onChange={e => setTitle(e.target.value)} placeholder="할 일 제목"
          onFocus={scrollTitleIntoView}
          onKeyDown={e => {
            if (e.key === "Enter" && !hasMemo && !hasRepeat && !important && !hasTime) {
              e.preventDefault();
              save();
            }
          }}
          style={{ ...formInput, borderRadius: RADIUS_PILL, borderColor: title.trim() ? "#ddd" : (CATEGORIES.find(c => c.id === catId)?.color || "#bbb") }} />
      </div>
      <div>
        <label style={formLabel}>카테고리</label>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {CATEGORIES.filter(c => !c.completed).map(c => (
            <button key={c.id} onClick={() => setCatId(c.id)} style={{
              padding: "6px 14px", borderRadius: RADIUS_PILL, border: `2px solid ${c.color}`,
              background: catId === c.id ? c.color : "#fff",
              color: catId === c.id ? "#fff" : c.color,
              fontWeight: 600, fontSize: 13, cursor: "pointer"
            }}>{c.label}</button>
          ))}
        </div>
      </div>
      {!isUnassigned && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <label style={{ ...formLabel, marginBottom: 0 }}>중요</label>
          <Toggle on={important} onChange={setImportant} />
        </div>
      )}
      <div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <label style={{ ...formLabel, marginBottom: 0 }}>메모</label>
          <Toggle on={hasMemo} onChange={setHasMemo} />
        </div>
        {hasMemo && (
          <div style={{ marginTop: 10 }}>
            <textarea value={memo} onChange={e => setMemo(e.target.value)} placeholder="메모 (선택사항)"
              rows={3} style={{ ...formInput, resize: "vertical", minHeight: 72, lineHeight: 1.5 }} />
          </div>
        )}
      </div>
      <div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <label style={formLabel}>시간</label>
            <Toggle on={hasTime} onChange={setHasTime} />
          </div>
          {hasTime && (
            <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ fontSize: 13, color: "#666", width: 40 }}>시작</span>
                <TimePicker hour={startH} minute={startM} onChange={(h, m) => { setStartH(h); setStartM(m); }} />
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ fontSize: 13, color: "#666", width: 40 }}>종료</span>
                {hasEndTime ? (
                  <TimePicker hour={endH} minute={endM} onChange={(h, m) => { setEndH(h); setEndM(m); }} />
                ) : (
                  <span style={{ fontSize: 14, color: "#bbb" }}>설정 안 됨</span>
                )}
                <button onClick={() => setHasEndTime(v => !v)} style={{
                  marginLeft: "auto", padding: "6px 12px", borderRadius: RADIUS_PILL,
                  border: `1.5px solid ${hasEndTime ? "#ddd" : "#222"}`,
                  background: hasEndTime ? "#fff" : "#222",
                  color: hasEndTime ? "#888" : "#fff",
                  fontWeight: 600, fontSize: 12, cursor: "pointer", flexShrink: 0,
                }}>설정 안 됨</button>
              </div>
              {!timeValid && (
                <div style={{ fontSize: 11, color: "#E07B7B" }}>종료 시간이 시작 시간보다 이릅니다</div>
              )}
            </div>
          )}
        </div>
      <div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <label style={formLabel}>반복</label>
          <Toggle on={hasRepeat} onChange={setHasRepeat} />
        </div>
        {hasRepeat && (
          <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 12 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                <div style={{ fontSize: 12, color: "#888" }}>반복 요일</div>
                {repDays.length === 0 && <div style={{ fontSize: 11, color: "#E07B7B" }}>요일을 선택해주세요</div>}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                {DAYS_KR1.map((d, i) => (
                  <button key={i} onClick={() => toggleRepDay(i)} style={{
                    width: 34, height: 34, borderRadius: "50%", border: "1.5px solid #ddd",
                    background: repDays.includes(i) ? "#222" : "#fff",
                    color: repDays.includes(i) ? "#fff" : "#222",
                    fontSize: 13, fontWeight: 600, cursor: "pointer"
                  }}>{d[0]}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                <div style={{ fontSize: 12, color: "#888", fontWeight: 600 }}>반복 종료일</div>
                {repDates.length === 0 && <div style={{ fontSize: 11, color: "#E07B7B" }}>날짜를 선택해주세요</div>}
              </div>
              <MiniCalendar selectedDates={repDates} onToggle={toggleRepDate} />
            </div>
          </div>
        )}
      </div>
      <button onClick={save} style={{
        width: "100%", padding: "14px", borderRadius: RADIUS_MD, border: "none",
        background: (title.trim() && repeatValid) ? "#111" : "#ccc", color: "#fff",
        fontWeight: 700, fontSize: 16, cursor: (title.trim() && repeatValid) ? "pointer" : "not-allowed", marginTop: 4
      }}>저장</button>
      <BottomSheet open={overnightConfirm} onClose={() => setOvernightConfirm(false)} title="종료 시간 확인">
        {overnightConfirm && (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div style={{ fontSize: 14, color: "#555", lineHeight: 1.6 }}>
              종료 시간이 시작 시간보다 이릅니다.<br />
              <b>{pad(endH)}:{pad(endM)}</b>에 <b>다음 날</b>로 끝나도록 저장할까요?
            </div>
            <ActionBtn label="예, 다음날로 저장" onClick={() => { setOvernightConfirm(false); doSave(); }} />
            <ActionBtn label="아니요, 시간 초기화" onClick={() => setOvernightConfirm(false)} color="#E07B7B" />
          </div>
        )}
      </BottomSheet>
    </div>
  );
}
