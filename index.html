// ─── useCrossCategoryDragSort hook ─────────────────────────────────
function useCrossCategoryDragSort(onMove) {
  const [dragging, setDragging] = useState(null);
  const [over, setOver] = useState(null);
  const longPressTimer = useRef(null);
  const isDraggingRef = useRef(false);
  const scrollContainerRef = useRef(null);
  const touchPointRef = useRef({ x: 0, y: 0 });
  const autoScrollRafRef = useRef(null);
  // Refs to avoid stale closures and enable RAF throttling
  const draggingRef = useRef(null);
  const overRef = useRef(null);
  const moveRafRef = useRef(null);
  const pendingTouchRef = useRef(null);

  function hitTest(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return null;
    const itemEl = el.closest("[data-drag-id]");
    const catEl = el.closest("[data-cat-id]");
    if (!catEl) return null;
    const catId = catEl.getAttribute("data-cat-id");
    const d = draggingRef.current;
    // Moving between categories isn't supported: hovering over a spot outside
    // the original category is ignored entirely, so items can't be absorbed into another category.
    if (d && catId !== d.catId) return null;
    const itemEls = Array.from(catEl.querySelectorAll("[data-drag-id]"))
      // A category can contain nested drag zones (e.g. the separate undone
      // vs completed lists). Only count items whose *nearest* data-cat-id
      // ancestor is this exact catEl, so hovering over the outer container
      // (a gap between the two zones, the header, etc.) never mixes items
      // from a different nested zone into this one's index calculation.
      .filter(el => el.closest("[data-cat-id]") === catEl);
    if (!itemEl || !catEl.contains(itemEl)) {
      // While hovering over a non-item area (category header, empty space, etc.) —
      // treat it as the top if above the first item, or the bottom if below the last item.
      if (itemEls.length === 0) return { catId, index: 0 };
      const firstRect = itemEls[0].getBoundingClientRect();
      if (y < firstRect.top) return { catId, index: 0 };
      const lastRect = itemEls[itemEls.length - 1].getBoundingClientRect();
      if (y > lastRect.bottom) return { catId, index: itemEls.length };
      // For ambiguous cases like gaps between items: decide based on the vertical center of the category area
      const catRect = catEl.getBoundingClientRect();
      return { catId, index: y < catRect.top + catRect.height / 2 ? 0 : itemEls.length };
    }
    const idx = itemEls.indexOf(itemEl);
    if (idx === -1) return { catId, index: itemEls.length };
    const rect = itemEl.getBoundingClientRect();
    const insertAfter = y > rect.top + rect.height / 2;
    return { catId, index: insertAfter ? idx + 1 : idx };
  }

  const EDGE_ZONE = 56;
  const MAX_SCROLL_SPEED = 6;
  function autoScrollTick() {
    const container = scrollContainerRef.current;
    if (!isDraggingRef.current || !container) {
      autoScrollRafRef.current = null;
      return;
    }
    const rect = container.getBoundingClientRect();
    const { x, y } = touchPointRef.current;
    let dy = 0;
    if (y < rect.top + EDGE_ZONE) {
      const depth = Math.min(1, (rect.top + EDGE_ZONE - y) / EDGE_ZONE);
      dy = -depth * MAX_SCROLL_SPEED;
    } else if (y > rect.bottom - EDGE_ZONE) {
      const depth = Math.min(1, (y - (rect.bottom - EDGE_ZONE)) / EDGE_ZONE);
      dy = depth * MAX_SCROLL_SPEED;
    }
    if (dy !== 0) {
      container.scrollTop += dy;
      const hit = hitTest(x, y);
      if (hit) {
        overRef.current = hit;
        setOver(hit);
      }
    }
    autoScrollRafRef.current = requestAnimationFrame(autoScrollTick);
  }

  function flushMove() {
    moveRafRef.current = null;
    const touch = pendingTouchRef.current;
    if (!touch || !isDraggingRef.current) return;
    pendingTouchRef.current = null;
    // Update visual drag position
    const cur = draggingRef.current;
    if (cur && cur.currentY !== touch.clientY) {
      const next = { ...cur, currentY: touch.clientY };
      draggingRef.current = next;
      setDragging(next);
    }
    // Update drop target
    const hit = hitTest(touch.clientX, touch.clientY);
    if (hit) {
      const prev = overRef.current;
      if (!prev || prev.catId !== hit.catId || prev.index !== hit.index) {
        overRef.current = hit;
        setOver(hit);
      }
    }
  }

  const pressStartRef = useRef(null);
  const MOVE_CANCEL_THRESHOLD = 10; // px — must move more than this to cancel the long press

  function onItemTouchStart(e, id, catId, index) {
    const touch = e.touches[0];
    pressStartRef.current = { x: touch.clientX, y: touch.clientY };
    longPressTimer.current = setTimeout(() => {
      isDraggingRef.current = true;
      _globalDragActive.current = true;
      const d = { id, catId, startY: touch.clientY, currentY: touch.clientY, origIndex: index };
      draggingRef.current = d;
      const o = { catId, index };
      overRef.current = o;
      setDragging(d);
      setOver(o);
      touchPointRef.current = { x: touch.clientX, y: touch.clientY };
      if (autoScrollRafRef.current == null) {
        autoScrollRafRef.current = requestAnimationFrame(autoScrollTick);
      }
      haptic([30]);
    }, 400);
  }

  function onItemTouchMove(e) {
    if (!isDraggingRef.current) {
      // While waiting for the drag to start — small jitter from a finger
      // doesn't cancel the long press; it's only canceled once the pointer
      // moves past a certain distance (treated as scroll intent).
      const start = pressStartRef.current;
      const touch = e.touches[0];
      const moved = start
        ? Math.hypot(touch.clientX - start.x, touch.clientY - start.y)
        : MOVE_CANCEL_THRESHOLD + 1;
      if (moved < MOVE_CANCEL_THRESHOLD) return;
      if (longPressTimer.current) { clearTimeout(longPressTimer.current); longPressTimer.current = null; }
      return;
    }
    if (longPressTimer.current) { clearTimeout(longPressTimer.current); longPressTimer.current = null; }
    e.preventDefault();
    e.stopPropagation();
    const touch = e.touches[0];
    touchPointRef.current = { x: touch.clientX, y: touch.clientY };
    pendingTouchRef.current = touch;
    if (moveRafRef.current === null) {
      moveRafRef.current = requestAnimationFrame(flushMove);
    }
  }

  function stopDrag() {
    isDraggingRef.current = false;
    _globalDragActive.current = false;
    if (longPressTimer.current) { clearTimeout(longPressTimer.current); longPressTimer.current = null; }
    if (moveRafRef.current !== null) { cancelAnimationFrame(moveRafRef.current); moveRafRef.current = null; }
    pendingTouchRef.current = null;
    pressStartRef.current = null;
  }

  function onItemTouchEnd() {
    // Flush pending RAF before committing drop
    if (moveRafRef.current !== null) {
      cancelAnimationFrame(moveRafRef.current);
      moveRafRef.current = null;
      if (pendingTouchRef.current !== null) flushMove();
    }
    // Capture refs BEFORE stopDrag() clears isDraggingRef so flushMove
    // inside stopDrag's callers can't race against the null-check.
    const d = draggingRef.current;
    const o = overRef.current;
    stopDrag();
    if (!d) return;
    if (o) {
      onMove(d.id, d.catId, o.catId, o.index);
    }
    setTimeout(() => {
      draggingRef.current = null;
      overRef.current = null;
      setDragging(null);
      setOver(null);
    }, 100);
  }

  function onItemTouchCancel() {
    stopDrag();
    draggingRef.current = null;
    overRef.current = null;
    setDragging(null);
    setOver(null);
  }

  useEffect(() => {
    const handler = (e) => {
      if (!isDraggingRef.current) return;
      e.preventDefault();
    };
    document.addEventListener("touchmove", handler, { passive: false });
    return () => {
      document.removeEventListener("touchmove", handler);
      if (autoScrollRafRef.current != null) {
        cancelAnimationFrame(autoScrollRafRef.current);
        autoScrollRafRef.current = null;
      }
    };
  }, []);

  return {
    dragging,
    over,
    scrollContainerRef,
    isDraggingRef,
    handlers: (id, catId, index) => ({
      onTouchStart: (e) => onItemTouchStart(e, id, catId, index),
      onTouchMove: onItemTouchMove,
      onTouchEnd: onItemTouchEnd,
      onTouchCancel: onItemTouchCancel,
    }),
  };
}

// ─── useFlipList hook ──────────────────────────────────────────────
// Animates items sliding into their new position (instead of teleporting)
// whenever their order/membership in `orderedIds` changes between renders —
// e.g. a todo moving from the "undone" list to the "done" list at the bottom.
// Uses the classic FLIP (First-Last-Invert-Play) technique so it works even
// when the item's DOM node gets unmounted/remounted across two different lists.
function useFlipList(orderedIds, disabled) {
  const rectsRef = useRef({});
  const nodesRef = useRef({});
  const refCacheRef = useRef({});
  // Tracks the (order + disabled) signature from the last render the effect
  // actually did work for. Re-renders that don't change either — e.g. the
  // background sync poll re-rendering the list with the exact same items in
  // the exact same order, or the many touchmove-driven re-renders during an
  // active drag (order + disabled both stay constant until drop) — skip the
  // measurement work entirely instead of re-measuring every item for nothing.
  const prevKeyRef = useRef(null);

  const getRef = useCallback((id) => {
    if (!refCacheRef.current[id]) {
      refCacheRef.current[id] = (el) => {
        if (el) nodesRef.current[id] = el;
        else delete nodesRef.current[id];
      };
    }
    return refCacheRef.current[id];
  }, []);

  const key = orderedIds.join("|") + "::" + disabled;

  useLayoutEffect(() => {
    if (prevKeyRef.current === key) return;
    prevKeyRef.current = key;

    const prevRects = rectsRef.current;
    const newRects = {};
    for (const id of orderedIds) {
      const el = nodesRef.current[id];
      if (el) newRects[id] = el.getBoundingClientRect();
    }
    if (!disabled) {
      for (const id of orderedIds) {
        const el = nodesRef.current[id];
        const prev = prevRects[id];
        const next = newRects[id];
        if (!el || !prev || !next) continue;
        const dx = prev.left - next.left;
        const dy = prev.top - next.top;
        if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) continue;
        el.style.transition = "none";
        el.style.transform = `translate(${dx}px, ${dy}px)`;
        el.style.zIndex = 20;
        // force reflow so the browser registers the starting position
        // before we animate to the natural (identity) position
        void el.offsetHeight;
        requestAnimationFrame(() => {
          el.style.transition = "transform 0.32s cubic-bezier(0.32,0.72,0,1)";
          el.style.transform = "translate(0,0)";
          const onEnd = (e) => {
            if (e.target !== el || e.propertyName !== "transform") return;
            el.style.transition = "";
            el.style.transform = "";
            el.style.zIndex = "";
            el.removeEventListener("transitionend", onEnd);
          };
          el.addEventListener("transitionend", onEnd);
        });
      }
    }
    rectsRef.current = newRects;
  });

  return getRef;
}

// ─── PaletteButton ───────────────────────────────────────────────
// Replaces the old inline swatch grid for picking a category
// color. Shows the currently picked color (if any) plus a "팔레트 선택하기"
// button that opens a picker sheet listing every color in CATEGORY_PALETTE
// as a tappable swatch.
function PaletteButton({ value, onPick }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 8, width: "100%",
      padding: "10px 14px", borderRadius: RADIUS_SM, border: "1.5px solid #eee",
      background: "#fafafa", boxSizing: "border-box", flexWrap: "wrap",
    }}>
      {CATEGORY_PALETTE.length === 0 ? (
        <span style={{ fontSize: 13, color: "#bbb" }}>팔레트 준비 중</span>
      ) : (
        CATEGORY_PALETTE.map(color => (
          <button key={color} onClick={() => onPick(color)} style={{
            width: 26, height: 26, borderRadius: 13, flexShrink: 0,
            background: color, border: value === color ? "2.5px solid #111" : "2px solid transparent",
            boxShadow: value === color ? "0 0 0 2px #fff inset" : "none",
            padding: 0, cursor: "pointer", WebkitTapHighlightColor: "transparent",
          }} />
        ))
      )}
    </div>
  );
}

// ─── CategorySettingsSheet ──────────────────────────────────────────
function CategorySettingsSheet({ open, onClose, categories, onAdd, onUpdateTitle, onUpdateColor, onDelete, onComplete, getTodoCount }) {
  const [newTitle, setNewTitle] = useState("");
  const [newColor, setNewColor] = useState(CATEGORY_PALETTE[0]);
  const [actionMenu, setActionMenu] = useState(null); // { category }
  const [editSheet, setEditSheet] = useState(null); // { category }
  const [editTitle, setEditTitle] = useState("");
  const [editColor, setEditColor] = useState(CATEGORY_PALETTE[0]);
  // Confirmation step before actually deleting a category: deleting a
  // category now cascades to remove every to-do inside it too, so we
  // warn the person (with a count) before doing something irreversible.
  const [deleteConfirm, setDeleteConfirm] = useState(null); // { category, count }

  useEffect(() => { if (open) { setNewTitle(""); setNewColor(CATEGORY_PALETTE[0]); setActionMenu(null); setEditSheet(null); setDeleteConfirm(null); } }, [open]);

  const requestDelete = (c) => {
    const count = getTodoCount ? getTodoCount(c.id) : 0;
    setActionMenu(null);
    setTimeout(() => setDeleteConfirm({ category: c, count }), 0);
  };

  const confirmDelete = () => {
    if (!deleteConfirm) return;
    onDelete(deleteConfirm.category.id);
    setDeleteConfirm(null);
  };

  const addCategory = () => {
    const title = newTitle.trim();
    if (!title) return;
    onAdd({ id: genId(), label: title, color: newColor });
    setNewTitle("");
    setNewColor(CATEGORY_PALETTE[0]);
  };

  const openEdit = (c) => {
    setEditTitle(c.label);
    setEditColor(c.color || CATEGORY_PALETTE[0]);
    setActionMenu(null);
    setTimeout(() => setEditSheet({ category: c }), 0);
  };

  const saveEdit = () => {
    const title = editTitle.trim();
    if (!title || !editSheet) return;
    onUpdateTitle(editSheet.category.id, title);
    onUpdateColor(editSheet.category.id, editColor);
    setEditSheet(null);
  };

  const visibleCategories = categories.filter(c => !c.completed);

  return (
    <BottomSheet open={open} onClose={onClose} title="카테고리 설정" dimmed={!!actionMenu || !!editSheet || !!deleteConfirm}>
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        {visibleCategories.length > 0 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {visibleCategories.map(c => (
              <button
                key={c.id}
                onClick={() => setActionMenu({ category: c })}
                style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: "8px 10px", borderRadius: RADIUS_SM, border: "1.5px solid #eee",
                  background: "#fff", cursor: "pointer", textAlign: "left",
                  WebkitTapHighlightColor: "transparent",
                }}
              >
                <span style={{
                  width: 22, height: 22, borderRadius: 11, flexShrink: 0, boxSizing: "border-box",
                  background: c.color || "#fff",
                  border: c.color ? "none" : "1.5px dashed #ccc",
                }} />
                <span style={{ flex: 1, fontSize: 15, fontWeight: 600, color: "#111" }}>{c.label}</span>
              </button>
            ))}
            <div style={{ height: 1, background: "#eee", margin: "4px 0" }} />
          </div>
        )}

        <div>
          <label style={formLabel}>새 카테고리 이름 *</label>
          <input value={newTitle} onChange={e => setNewTitle(e.target.value)}
            placeholder="카테고리 이름" style={formInput} />
        </div>

        <div>
          <label style={formLabel}>카테고리 색상</label>
          <PaletteButton value={newColor} onPick={setNewColor} />
        </div>

        <button onClick={addCategory} disabled={!newTitle.trim()} style={{
          width: "100%", padding: "14px", borderRadius: RADIUS_MD, border: "none",
          background: newTitle.trim() ? "#111" : "#ddd", color: "#fff",
          fontWeight: 700, fontSize: 16,
          cursor: newTitle.trim() ? "pointer" : "default",
          WebkitTapHighlightColor: "transparent",
        }}>
          카테고리 추가
        </button>
      </div>

      <BottomSheet open={!!actionMenu} onClose={() => setActionMenu(null)} title={actionMenu?.category.label || "카테고리"}>
        {actionMenu && (
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <ActionBtn icon={<ABIconEdit />} label="수정" onClick={() => openEdit(actionMenu.category)} />
            <ActionBtn icon={<ABIconTrash color="#E07B7B" />} label="삭제" onClick={() => requestDelete(actionMenu.category)} color="#E07B7B" />
            {/* "완료" 처리: 카테고리를 완료 상태로 표시하고, 일반 카테고리 설정
                목록에서는 숨긴 뒤 "완료 카테고리 보기" 화면으로 이동시킨다. */}
            <ActionBtn icon={<ABIconCheckSmall color="#111" />} label="완료" onClick={() => { onComplete(actionMenu.category.id); setActionMenu(null); }} />
          </div>
        )}
      </BottomSheet>

      <BottomSheet open={!!deleteConfirm} onClose={() => setDeleteConfirm(null)} title="카테고리 삭제">
        {deleteConfirm && (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div style={{ fontSize: 14, color: "#555", lineHeight: 1.6 }}>
              {deleteConfirm.count > 0 ? (
                <>
                  카테고리 <b>"{deleteConfirm.category.label}"</b>에 할 일이 <b>{deleteConfirm.count}</b>개 있습니다.<br />
                  이 카테고리를 삭제하면 {deleteConfirm.count === 1 ? "그 할 일도" : "그 할 일들도 모두"} 함께 영구적으로 삭제되며, 되돌릴 수 없습니다.
                </>
              ) : (
                <>"<b>{deleteConfirm.category.label}</b>"를 삭제할까요? 되돌릴 수 없습니다.</>
              )}
            </div>
            <ActionBtn icon={<ABIconTrash color="#E07B7B" />} label={deleteConfirm.count > 0 ? `카테고리 삭제 & 할 일 ${deleteConfirm.count}개` : "카테고리 삭제"} onClick={confirmDelete} color="#E07B7B" />
          </div>
        )}
      </BottomSheet>

      <BottomSheet open={!!editSheet} onClose={() => setEditSheet(null)} title="카테고리 수정">
        {editSheet && (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div>
              <label style={formLabel}>카테고리 이름 *</label>
              <input value={editTitle} onChange={e => setEditTitle(e.target.value)}
                placeholder="카테고리 이름" style={formInput} />
            </div>
            <div>
              <label style={formLabel}>카테고리 색상</label>
              <PaletteButton value={editColor} onPick={setEditColor} />
            </div>
            <button onClick={saveEdit} disabled={!editTitle.trim()} style={{
              width: "100%", padding: "14px", borderRadius: RADIUS_MD, border: "none",
              background: editTitle.trim() ? "#111" : "#ddd", color: "#fff",
              fontWeight: 700, fontSize: 16,
              cursor: editTitle.trim() ? "pointer" : "default",
              WebkitTapHighlightColor: "transparent",
            }}>
              Save
            </button>
          </div>
        )}
      </BottomSheet>
    </BottomSheet>
  );
}

// ─── SyncSettingsSheet ──────────────────────────────────────────────
// Lets the person link this browser to a Google Apps Script web app (backed
// by a Google Sheet, deployed once by the person) so the same data can be
// shared between two devices via that web app's URL.
function SyncSettingsSheet({
  open, onClose, syncUrl, syncStatus, syncBusy, syncError, lastSyncedAt,
  onConnect, onDisconnect, onManualSync,
}) {
  const [urlValue, setUrlValue] = useState("");
  const [copied, setCopied] = useState(false);

  useEffect(() => { if (!open) { setUrlValue(""); setCopied(false); } }, [open]);

  function copyUrl() {
    if (!syncUrl) return;
    try {
      navigator.clipboard?.writeText(syncUrl);
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    } catch {}
  }

  const statusLabel = syncStatus === "syncing" ? "동기화 중…"
    : syncStatus === "error" ? "동기화 실패 — 다시 시도합니다"
    : lastSyncedAt ? `마지막 동기화 ${new Date(lastSyncedAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`
    : "아직 동기화되지 않음";

  return (
    <BottomSheet open={open} onClose={onClose} title="기기 동기화">
      {!syncUrl ? (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div style={{ fontSize: 13, color: "#777", lineHeight: 1.5 }}>
            Google 시트를 통해 데이터를 동기화합니다. Apps Script 웹 앱을 한 번 배포한 뒤, 그 URL을 두 기기에 각각 붙여넣으세요.
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <label style={{ fontSize: 12, color: "#999" }}>Apps Script 웹 앱 URL</label>
            <input
              value={urlValue}
              onChange={e => setUrlValue(e.target.value)}
              placeholder="https://script.google.com/macros/s/.../exec"
              style={{
                width: "100%", padding: "12px 14px", borderRadius: RADIUS_SM,
                border: "1.5px solid #eee", fontSize: 13, boxSizing: "border-box",
              }}
            />
            <button onClick={() => onConnect(urlValue)} disabled={syncBusy || !urlValue.trim()} style={{
              width: "100%", padding: "13px", borderRadius: RADIUS_MD, border: "none",
              background: "#111", color: "#fff", fontWeight: 700, fontSize: 15,
              cursor: (syncBusy || !urlValue.trim()) ? "default" : "pointer",
              opacity: (syncBusy || !urlValue.trim()) ? 0.5 : 1,
              WebkitTapHighlightColor: "transparent",
            }}>
              연결
            </button>
          </div>
          {syncError && (
            <div style={{ fontSize: 12, color: "#C46B5A" }}>{syncError}</div>
          )}
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div style={{ fontSize: 13, color: "#777", lineHeight: 1.5 }}>
            다른 기기에서도 같은 URL을 붙여넣으면 이 데이터에 연결됩니다.
          </div>
          <div onClick={copyUrl} style={{
            width: "100%", padding: "14px", borderRadius: RADIUS_MD, border: "1.5px solid #eee",
            background: "#fafafa", display: "flex", alignItems: "center", justifyContent: "space-between",
            gap: 10, cursor: "pointer", boxSizing: "border-box",
          }}>
            <span style={{ fontSize: 12, fontWeight: 700, fontFamily: "monospace", wordBreak: "break-all" }}>{syncUrl}</span>
            <span style={{ fontSize: 12, color: copied ? "#486249" : "#999", flexShrink: 0, fontWeight: 600 }}>
              {copied ? "복사됨" : "복사"}
            </span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{
              width: 8, height: 8, borderRadius: "50%", flexShrink: 0,
              background: syncDotColor(syncUrl, syncStatus),
              animation: syncStatus === "syncing" ? "ondot-sync-pulse 1.1s ease-in-out infinite" : "none",
            }} />
            <div style={{ fontSize: 12, color: syncStatus === "error" ? "#C46B5A" : "#999" }}>{statusLabel}</div>
          </div>
          <button onClick={onManualSync} disabled={syncBusy} style={{
            width: "100%", padding: "13px", borderRadius: RADIUS_MD, border: "1.5px solid #eee",
            background: "#fff", color: "#111", fontWeight: 700, fontSize: 15,
            cursor: syncBusy ? "default" : "pointer", opacity: syncBusy ? 0.6 : 1,
            WebkitTapHighlightColor: "transparent",
          }}>
            지금 동기화
          </button>
          <button onClick={onDisconnect} style={{
            width: "100%", padding: "13px", borderRadius: RADIUS_MD, border: "1.5px solid #eee",
            background: "#fff", color: "#E07B7B", fontWeight: 700, fontSize: 15,
            cursor: "pointer", WebkitTapHighlightColor: "transparent",
          }}>
            동기화 연결 해제
          </button>
        </div>
      )}
    </BottomSheet>
  );
}

// ─── MonthCalendar ────────────────────────────────────────────────
const MonthCalendar = memo(function MonthCalendar({ selectedDate, viewDate, onSelect, onNavigate, forceExpanded, showOwnHeader = true, folded: foldedProp, setFolded: setFoldedProp, todos }) {
  // When a separate onNavigate is supplied, month/week arrow navigation uses
  // it instead of onSelect — this lets callers (like the D-Day picker) move
  // between months to browse without that navigation being treated as
  // "the user picked this date" (which would otherwise immediately finalize
  // and close the picker).
  const navigate = onNavigate || onSelect;
  const today = useMemo(() => todayStr(), []);
  const [foldedState, setFoldedState] = useState(true);
  const folded = forceExpanded ? false : (foldedProp !== undefined ? foldedProp : foldedState);
  const setFolded = setFoldedProp || setFoldedState;

  // The month/week actually displayed follows `viewDate` when the caller
  // supplies one (e.g. the D-Day picker, which browses months independently
  // of which date ends up highlighted as picked). Callers that don't pass
  // `viewDate` keep the old behavior of following `selectedDate` directly.
  const displayDate = viewDate || selectedDate;
  const sel = dateFromStr(displayDate);
  const year = sel.getFullYear();
  const month = sel.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = useMemo(() => {
    const arr = [];
    for (let i = 0; i < firstDay; i++) arr.push(null);
    for (let d = 1; d <= daysInMonth; d++) arr.push(d);
    return arr;
  }, [year, month, firstDay, daysInMonth]);

  const weekDates = useMemo(() => {
    const d = dateFromStr(displayDate);
    const dow = d.getDay();
    const sunday = new Date(d);
    sunday.setDate(d.getDate() - dow);
    return Array.from({ length: 7 }, (_, i) => {
      const day = new Date(sunday);
      day.setDate(sunday.getDate() + i);
      return `${day.getFullYear()}-${pad(day.getMonth() + 1)}-${pad(day.getDate())}`;
    });
  }, [displayDate]);

  const ROW_H = 34;
  const ROW_GAP = 5;
  const HEADER_H = 28;
  const BADGE_OVERFLOW = 6; // reserve space above the first row so the todo-count badge (which pokes above the cell) isn't clipped by overflow:hidden
  const totalRows = Math.ceil(cells.length / 7);
  const fullH = HEADER_H + totalRows * ROW_H + (totalRows - 1) * ROW_GAP + 4;
  const foldedH = HEADER_H + ROW_H + 4;

  function renderCell(ds, key) {
    const d = dateFromStr(ds);
    const dayNum = d.getDate();
    const dow = d.getDay();
    const isToday = ds === today;
    const isSel = ds === selectedDate;
    const col = isToday ? "#fff" : dow === 0 ? "#E07B7B" : dow === 6 ? "#7B9EE0" : "#222";
    // Whether a todo (repeat or one-off) actually occurs on this date at all,
    // regardless of whether it's marked "important" — used to decide whether
    // to show any status dot for the day in the first place.
    const isActiveOnDate = (t) => {
      if (t.excludedDates?.includes(ds)) return false;
      if (t.dates?.includes(ds)) return true;
      if (t.repeat) {
        if (t.createdDate && ds < t.createdDate) return false;
        const dw = dateFromStr(ds).getDay();
        return t.repeat.days?.includes(dw) && (!t.repeat.dates?.length || ds <= t.repeat.dates[0]);
      }
      return false;
    };
    const isImportantActive = (t) => t.important && isActiveOnDate(t);
    // "미표시 할일" items are excluded from the date badge entirely — they're
    // meant to be off-the-books scratch notes, not counted todos.
    const countableTodos = (todos ?? []).filter(t => t.categoryId !== "unassigned");
    const activeTodos = countableTodos.filter(isActiveOnDate);
    const hasAnyTodo = activeTodos.length > 0;
    const todoCount = activeTodos.length;
    const importantTodos = countableTodos.filter(isImportantActive);
    const hasImportant = importantTodos.length > 0;
    const allImportantDone = hasImportant && importantTodos.every(t => !!t.done?.[ds]);
    const importantDotColor = !hasImportant ? "#ccc"
      : allImportantDone ? mixHex(IMPORTANT_DOT_COLOR, "#cccccc", 0.55)
      : IMPORTANT_DOT_COLOR;
    return (
      <div key={key} onClick={() => onSelect(ds)} style={{
        height: ROW_H, display: "flex", alignItems: "center", justifyContent: "center",
        cursor: "pointer", position: "relative",
        margin: "0 auto", width: 32,
      }}>
        <div style={{
          width: 32, height: 32, borderRadius: RADIUS_PILL,
          display: "flex", alignItems: "center", justifyContent: "center",
          background: isToday ? "#111" : isSel ? "#f0f0f0" : "transparent",
          color: isToday ? "#fff" : col,
          fontWeight: isToday ? 700 : 400, fontSize: 14,
        }}>{dayNum}</div>
        {hasAnyTodo && (
          <div style={{
            position: "absolute", top: -4, right: -6,
            minWidth: 13, height: 13, padding: "0 3px", boxSizing: "border-box",
            borderRadius: RADIUS_PILL, display: "flex", alignItems: "center", justifyContent: "center",
            background: importantDotColor,
            boxShadow: "0 0 0 1.5px #fff",
            pointerEvents: "none",
          }}>
            <span style={{ fontSize: 9, fontWeight: 700, color: "#fff", lineHeight: 1, whiteSpace: "nowrap" }}>
              {todoCount > 9 ? "9+" : todoCount}
            </span>
          </div>
        )}
      </div>
    );
  }

  const DayHeader = (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", textAlign: "center", height: HEADER_H, alignItems: "center" }}>
      {DAYS_KR1.map((d, i) => (
        <div key={d} style={{ fontSize: 12, fontWeight: 600, color: i === 0 ? "#E07B7B" : i === 6 ? "#7B9EE0" : "#888" }}>{d}</div>
      ))}
    </div>
  );

  return (
    <div style={{ padding: "10px 20px 0 16px" }}>
      {showOwnHeader && (
        <div style={{ marginBottom: 6 }}>
          <div style={{ position: "relative", display: "flex", alignItems: "center", justifyContent: "center", gap: 14 }}>
            <button
              onClick={() => {
                if (folded) {
                  const moved = addDays(displayDate, -7);
                  const d = dateFromStr(moved);
                  const sunday = addDays(moved, -d.getDay());
                  navigate(sunday);
                } else { const d = new Date(year, month - 1, 1); navigate(`${d.getFullYear()}-${pad(d.getMonth() + 1)}-01`); }
              }}
              style={{ ...arrowBtn, display: "flex", alignItems: "center" }}
            ><IconChevronLeft /></button>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontWeight: 700, fontSize: 16 }}>
                {formatDateLabelKR(displayDate)}
              </span>
              {!forceExpanded && selectedDate !== today && (
                <button onClick={() => onSelect(today)} style={{
                  padding: "3px 10px", borderRadius: RADIUS_PILL, border: "1.5px solid #ddd",
                  background: "#fff", color: "#555", fontSize: 10, fontWeight: 600,
                  cursor: "pointer", lineHeight: 1.4, WebkitTapHighlightColor: "transparent",
                }}>오늘</button>
              )}
            </div>
            <button
              onClick={() => {
                if (folded) {
                  const moved = addDays(displayDate, 7);
                  const d = dateFromStr(moved);
                  const sunday = addDays(moved, -d.getDay());
                  navigate(sunday);
                } else { const d = new Date(year, month + 1, 1); navigate(`${d.getFullYear()}-${pad(d.getMonth() + 1)}-01`); }
              }}
              style={{ ...arrowBtn, display: "flex", alignItems: "center" }}
            ><IconChevronRight /></button>
          </div>
        </div>
      )}

      {DayHeader}

      <div style={{
        overflow: "hidden",
        paddingTop: BADGE_OVERFLOW,
        height: (folded ? foldedH - HEADER_H : fullH - HEADER_H) + BADGE_OVERFLOW,
        transition: "height 0.32s cubic-bezier(0.4,0,0.2,1)",
      }}>
        {folded ? (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", textAlign: "center", paddingBottom: 4 }}>
            {weekDates.map(ds => renderCell(ds, ds))}
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: `${ROW_GAP}px 0`, textAlign: "center", paddingBottom: 4 }}>
            {cells.map((d, i) => {
              if (!d) return <div key={`e${i}`} style={{ height: ROW_H }} />;
              const ds = `${year}-${pad(month + 1)}-${pad(d)}`;
              return renderCell(ds, ds);
            })}
          </div>
        )}
      </div>

      {!forceExpanded && (
        <div style={{ display: "flex", justifyContent: "center", marginTop: 4, marginBottom: 2 }}>
          <button onClick={() => setFolded(f => !f)} style={{
            width: 28, height: 28, borderRadius: 14,
            background: "#f0f0f0", border: "none", cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
              style={{ transform: folded ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.32s cubic-bezier(0.4,0,0.2,1)" }}>
              <polyline points="2,9 7,4 12,9" stroke="#555" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </button>
        </div>
      )}
    </div>
  );
});

// ─── TodoTab ──────────────────────────────────────────────────────
function TodoTab({ todos, setTodos, selectedDate, setSelectedDate, onSheetChange, dateTodos, repeatTodos, calendarFolded, setCalendarFolded, onDotChange }) {
  const [sheet, setSheet] = useState(null);
  const [actionMenu, setActionMenu] = useState(null);
  const [dateChangeMenu, setDateChangeMenu] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [editConfirm, setEditConfirm] = useState(null);
  const [moveAllConfirm, setMoveAllConfirm] = useState(false);

  const anyOpen = !!(sheet || actionMenu || dateChangeMenu || deleteConfirm || editConfirm || moveAllConfirm);
  useEffect(() => { onSheetChange?.(anyOpen); }, [anyOpen, onSheetChange]);

  const dayTodosAll = useMemo(() => {
    return todos.flatMap(t => {
      if (t.excludedDates?.includes(selectedDate)) return [];
      if (t.dates?.includes(selectedDate)) return [t];
      if (t.repeat) {
        if (t.createdDate && selectedDate < t.createdDate) return [];
        const d = dateFromStr(selectedDate);
        if (t.repeat.days?.includes(d.getDay()) && (!t.repeat.dates?.length || selectedDate <= t.repeat.dates[0])) {
          return [t];
        }
      }
      return [];
    });
  }, [todos, selectedDate]);

  // All todos (repeat + every date) for MonthCalendar dot rendering
  const allTodosForDots = useMemo(() => {
    const allDay = Object.values(dateTodos || {}).flat();
    const repeatTodosVisible = repeatTodos || [];
    const repeatIds = new Set(repeatTodosVisible.map(t => t.id));
    const seenIds = new Set();
    const uniqueDay = allDay.filter(t => {
      if (repeatIds.has(t.id) || seenIds.has(t.id)) return false;
      seenIds.add(t.id);
      return true;
    });
    return [...repeatTodosVisible, ...uniqueDay];
  }, [repeatTodos, dateTodos]);

  const addTodo = useCallback((data) => {
    const newTodo = {
      id: genId(), ...data,
      dates: data.repeat ? [] : [selectedDate],
      createdDate: selectedDate,
      createdAt: Date.now(),
      done: {},
    };
    setTodos(prev => [...prev, newTodo]);
    setSheet(null);
  }, [selectedDate, setTodos]);

  const saveTodo = useCallback((todo, data) => {
    if (todo.repeat) { setEditConfirm({ todo, data }); }
    else { setTodos(prev => prev.map(t => t.id === todo.id ? { ...t, ...data } : t)); setSheet(null); }
  }, [setTodos]);

  const doEdit = useCallback((todo, data, all) => {
    if (all) {
      setTodos(prev => prev.map(t => {
        if (t.id !== todo.id) return t;

        // Split the repeat in two at selectedDate so past occurrences keep
        // their old content: a frozen copy ends the day before, and the
        // live todo (now carrying the new data) only starts today onward.
        const dayBefore = addDays(selectedDate, -1);
        const pastEnd = t.repeat?.dates?.length ? t.repeat.dates[0] : null;
        const hasPast = (!t.createdDate || t.createdDate <= dayBefore) && (!pastEnd || dayBefore <= pastEnd);

        if (hasPast) {
          const pastDone = {};
          const futureDone = {};
          for (const d of Object.keys(t.done || {})) {
            if (d <= dayBefore) pastDone[d] = t.done[d];
            else futureDone[d] = t.done[d];
          }
          const pastCopy = {
            ...t,
            id: genId(),
            repeat: { ...t.repeat, dates: [dayBefore] },
            done: pastDone,
            excludedDates: (t.excludedDates || []).filter(d => d <= dayBefore),
          };
          const updatedLive = {
            ...t, ...data,
            createdDate: selectedDate,
            done: futureDone,
            excludedDates: (t.excludedDates || []).filter(d => d >= selectedDate),
          };
          return [pastCopy, updatedLive];
        }

        // No past occurrences exist yet (e.g. repeat starts today or later),
        // so there's nothing to preserve — just update in place.
        return { ...t, ...data };
      }).flat());
    } else {
      setTodos(prev => {
        const withExclusion = prev.map(t =>
          t.id === todo.id
            ? { ...t, excludedDates: [...(t.excludedDates || []), selectedDate] }
            : t
        );
        const overrideTodo = {
          id: genId(),
          ...data,
          repeat: null,
          dates: [selectedDate],
          createdDate: selectedDate,
          done: todo.done?.[selectedDate] ? { [selectedDate]: true } : {},
        };
        return [...withExclusion, overrideTodo];
      });
    }
    setEditConfirm(null); setSheet(null);
  }, [selectedDate, setTodos]);

  const toggleDone = useCallback((todo) => {
    const completing = !todo.done?.[selectedDate];
    if (completing) haptic([8, 40, 12]);
    if (todo.categoryId !== "unassigned") onDotChange?.(completing ? 1 : -1);
    setTodos(prev => prev.map(t => {
      if (t.id !== todo.id) return t;
      const done = { ...t.done };
      done[selectedDate] = !done[selectedDate];
      return { ...t, done };
    }));
  }, [selectedDate, setTodos, onDotChange]);

  const deleteTodo = useCallback((todo) => {
    if (todo.repeat) { setActionMenu(null); setTimeout(() => setDeleteConfirm({ todo }), 0); }
    else { setTodos(prev => prev.filter(t => t.id !== todo.id)); setActionMenu(null); }
  }, [setTodos]);

  const doDelete = useCallback((todo, all) => {
    if (all) {
      setTodos(prev => prev.flatMap(t => {
        if (t.id !== todo.id) return [t];

        // Keep past occurrences alive as a frozen copy ending the day
        // before selectedDate; only the live (future) repeat is removed.
        const dayBefore = addDays(selectedDate, -1);
        const pastEnd = t.repeat?.dates?.length ? t.repeat.dates[0] : null;
        const hasPast = (!t.createdDate || t.createdDate <= dayBefore) && (!pastEnd || dayBefore <= pastEnd);

        if (!hasPast) return []; // nothing happened yet — safe to remove entirely

        const pastDone = {};
        for (const d of Object.keys(t.done || {})) {
          if (d <= dayBefore) pastDone[d] = t.done[d];
        }
        return [{
          ...t,
          id: genId(),
          repeat: { ...t.repeat, dates: [dayBefore] },
          done: pastDone,
          excludedDates: (t.excludedDates || []).filter(d => d <= dayBefore),
        }];
      }));
    } else {
      setTodos(prev => prev.map(t => {
        if (t.id !== todo.id) return t;
        const next = { ...t, excludedDates: [...(t.excludedDates || []), selectedDate] };
        if (!t.repeat) next.dates = (t.dates || []).filter(d => d !== selectedDate);
        return next;
      }));
    }
    setDeleteConfirm(null);
  }, [selectedDate, setTodos]);

  // Moves a to-do into the archive: it's flagged `archived` (rather than
  // deleted) so its data — including any repeat/date history — is kept,
  // it just stops appearing anywhere in the normal day/date views or dots,
  // until it's restored from the Archive screen.
  const archiveTodo = useCallback((todo) => {
    setTodos(prev => prev.map(t => t.id === todo.id ? { ...t, archived: true } : t));
    setActionMenu(null);
  }, [setTodos]);

  const moveNextDay = useCallback((todo) => {
    const next = addDays(selectedDate, 1);
    setTodos(prev => prev.map(t => {
      if (t.id !== todo.id) return t;
      return { ...t, dates: [...(t.dates || []).filter(d => d !== selectedDate), next] };
    }));
    setActionMenu(null);
  }, [selectedDate, setTodos]);

  // Moves the selected date's todo to today's date (used for todos more than 2 days old, or future todos).
  const moveToToday = useCallback((todo) => {
    const next = todayStr();
    setTodos(prev => prev.map(t => {
      if (t.id !== todo.id) return t;
      return { ...t, dates: [...(t.dates || []).filter(d => d !== selectedDate), next] };
    }));
    setActionMenu(null);
  }, [selectedDate, setTodos]);

  // Duplicates a completed todo as a fresh (undone) todo on today's date,
  // leaving the original completed entry untouched.
  const repeatToday = useCallback((todo) => {
    const today = todayStr();
    const newTodo = {
      id: genId(),
      title: todo.title,
      memo: todo.memo,
      categoryId: todo.categoryId,
      hasTime: todo.hasTime,
      startH: todo.startH, startM: todo.startM, endH: todo.endH, endM: todo.endM,
      repeat: null,
      dates: [today],
      createdDate: today,
      done: {},
    };
    setTodos(prev => [...prev, newTodo]);
    haptic([8, 40, 12]);
    setActionMenu(null);
  }, [selectedDate, setTodos]);

  const changeTodoDate = useCallback((todo, newDate) => {
    if (newDate === selectedDate) { setDateChangeMenu(null); return; }
    setTodos(prev => prev.map(t => {
      if (t.id !== todo.id) return t;
      return { ...t, dates: [...(t.dates || []).filter(d => d !== selectedDate), newDate] };
    }));
    setDateChangeMenu(null);
  }, [selectedDate, setTodos]);

  const moveAllUndoneTomorrow = useCallback(() => {
    const tomorrow = addDays(selectedDate, 1);
    const undoneIds = new Set(
      dayTodosAll
        .filter(t => !t.done?.[selectedDate] && !t.repeat)
        .map(t => t.id)
    );
    if (undoneIds.size === 0) return;
    setTodos(prev => prev.map(t => {
      if (!undoneIds.has(t.id)) return t;
      return {
        ...t,
        dates: [...(t.dates || []).filter(d => d !== selectedDate), tomorrow],
      };
    }));
    haptic([8, 40, 8, 40, 15]);
    setMoveAllConfirm(false);
  }, [selectedDate, dayTodosAll, setTodos]);

  // Moves a todo to a (possibly different) category and a specific
  // position within that category's undone list for selectedDate. Handles
  // same-category reordering and cross-category moves with one code path:
  // the todo is removed from its old category's order, categoryId is
  // updated if it changed, then re-inserted at toIndex in the destination
  // category's (possibly now-shorter) undone list.
  const moveTodoCrossCategory = useCallback((todoId, fromCatId, toCatId, toIndex) => {
    setTodos(prev => {
      const undoneForCat = (catId, excludeId) => prev
        .filter(t => {
          if (t.id === excludeId) return false;
          if (t.excludedDates?.includes(selectedDate)) return false;
          if (t.dates?.includes(selectedDate)) return t.categoryId === catId && !t.done?.[selectedDate];
          if (repeatMatchesDate(t, selectedDate)) return t.categoryId === catId && !t.done?.[selectedDate];
          return false;
        })
        .map(t => ({ ...t, _catOrder: effectiveCatOrder(t, selectedDate) }))
        .sort(compareTodoOrder);

      const moved = prev.find(t => t.id === todoId);
      if (!moved) return prev;

      const destList = undoneForCat(toCatId, todoId);
      const clampedIndex = Math.max(0, Math.min(toIndex, destList.length));

      // Only the dropped todo's own order value changes. Everyone else
      // (including the whole completed list, which shares this same order
      // scale) keeps their exact previous value, so a later completion
      // still lands relative to the rest correctly instead of colliding
      // with numbers freshly reassigned to a different bucket.
      const beforeOrder = clampedIndex > 0 ? destList[clampedIndex - 1]._catOrder : null;
      const afterOrder = clampedIndex < destList.length ? destList[clampedIndex]._catOrder : null;
      const newOrder = orderBetween(beforeOrder, afterOrder);

      // Repeating todos only ever reorder within their own category (cross-
      // category drag is disabled above them too), so categoryId never
      // needs to change for them — their new position is stored under
      // repeatOrder[selectedDate] so it applies to this occurrence only.
      return prev.map(t => {
        if (t.id !== todoId) return t;
        if (t.repeat) {
          return { ...t, repeatOrder: { ...(t.repeatOrder || {}), [selectedDate]: newOrder } };
        }
        return { ...t, categoryId: toCatId, _catOrder: newOrder };
      });
    });
  }, [selectedDate, setTodos]);

  // Reorders a todo within its category's *completed* list for selectedDate.
  // Mirrors moveTodoCrossCategory but scoped to items that are already done
  // on this date — completed todos only ever reorder among themselves within
  // the same category, they never change category or done-state here.
  const moveTodoWithinDone = useCallback((catId, todoId, toIndex) => {
    setTodos(prev => {
      const doneForCat = prev
        .filter(t => {
          if (t.id === todoId) return false;
          if (t.excludedDates?.includes(selectedDate)) return false;
          if (t.dates?.includes(selectedDate)) return t.categoryId === catId && !!t.done?.[selectedDate];
          if (repeatMatchesDate(t, selectedDate)) return t.categoryId === catId && !!t.done?.[selectedDate];
          return false;
        })
        .map(t => ({ ...t, _catOrder: effectiveCatOrder(t, selectedDate) }))
        .sort(compareTodoOrder);

      const moved = prev.find(t => t.id === todoId);
      if (!moved) return prev;

      const clampedIndex = Math.max(0, Math.min(toIndex, doneForCat.length));

      // As above: only the dragged todo's own order value changes, so the
      // rest of the completed list — and the shared order scale it uses
      // with the undone list — stays untouched.
      const beforeOrder = clampedIndex > 0 ? doneForCat[clampedIndex - 1]._catOrder : null;
      const afterOrder = clampedIndex < doneForCat.length ? doneForCat[clampedIndex]._catOrder : null;
      const newOrder = orderBetween(beforeOrder, afterOrder);

      return prev.map(t => {
        if (t.id !== todoId) return t;
        if (t.repeat) {
          return { ...t, repeatOrder: { ...(t.repeatOrder || {}), [selectedDate]: newOrder } };
        }
        return { ...t, _catOrder: newOrder };
      });
    });
  }, [selectedDate, setTodos]);

  const crossDrag = useCrossCategoryDragSort((todoId, fromCatId, toCatId, toIndex) => {
    if (toCatId !== fromCatId) return; // Moving between categories (or between the done/undone zones) is disabled: only reordering within the same zone is allowed
    if (fromCatId.endsWith(DONE_ZONE_SUFFIX)) {
      const realCatId = fromCatId.slice(0, -DONE_ZONE_SUFFIX.length);
      moveTodoWithinDone(realCatId, todoId, toIndex);
      return;
    }
    moveTodoCrossCategory(todoId, fromCatId, toCatId, toIndex);
  });

  // Vertical swipe forwarding: MonthCalendar sits in a fixed header above
  // ondot-todo-scroll (the actual scrollable region), so a vertical drag
  // that starts on the calendar itself would otherwise go nowhere — the
  // header isn't scrollable and its parent is overflow:hidden. We forward
  // the touch delta onto the scroll container's scrollTop so dragging
  // vertically anywhere over the calendar just scrolls the list below it,
  // like the rest of the screen does. Taps (no meaningful move) still fall
  // through untouched, so date selection keeps working normally.
  const calendarTouchY = useRef(null);
  const onCalendarTouchStart = (e) => { calendarTouchY.current = e.touches[0].clientY; };
  const onCalendarTouchMove = (e) => {
    if (calendarTouchY.current === null) return;
    const currentY = e.touches[0].clientY;
    const delta = calendarTouchY.current - currentY;
    calendarTouchY.current = currentY;
    const el = crossDrag.scrollContainerRef.current;
    if (el) el.scrollTop += delta;
  };
  const onCalendarTouchEnd = () => { calendarTouchY.current = null; };

  return (
    <div id="ondot-capture-todo" style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", position: "relative", background: "#fff" }}>
      <div
        style={{ flexShrink: 0, marginTop: 0 }}
        onTouchStart={onCalendarTouchStart}
        onTouchMove={onCalendarTouchMove}
        onTouchEnd={onCalendarTouchEnd}
        onTouchCancel={onCalendarTouchEnd}
      >
        <MonthCalendar selectedDate={selectedDate} onSelect={setSelectedDate} showOwnHeader={false} folded={calendarFolded} setFolded={setCalendarFolded} todos={allTodosForDots} />
        <div style={{ height: 1, background: "#eee", margin: "10px 0 0" }} />
      </div>
      <div id="ondot-todo-scroll" ref={crossDrag.scrollContainerRef} style={{ flex: 1, overflowY: !!crossDrag.dragging ? "hidden" : "auto", overscrollBehaviorY: "contain", padding: "10px 16px 32px", position: "relative", background: "#fff" }}>
        {CATEGORIES.map(cat => {
          const catTodos = dayTodosAll.filter(t => t.categoryId === cat.id);
          const catUndone = [...catTodos.filter(t => !t.done?.[selectedDate])]
            .map(t => ({ ...t, _catOrder: effectiveCatOrder(t, selectedDate) }))
            .sort(compareTodoOrder);
          const catDone = [...catTodos.filter(t => t.done?.[selectedDate])]
            .map(t => ({ ...t, _catOrder: effectiveCatOrder(t, selectedDate) }))
            .sort(compareTodoOrder);
          if (cat.completed && catTodos.length === 0) return null;
          return (
            <CategoryDragList
              key={cat.id}
              cat={cat}
              catUndone={catUndone}
              catDone={catDone}
              selectedDate={selectedDate}
              onAdd={() => setSheet({ categoryId: cat.id })}
              onToggle={toggleDone}
              onAction={(todo) => setActionMenu({ todo })}
              crossDrag={crossDrag}
            />
          );
        })}
        {(() => {
          const undoneCount = dayTodosAll.filter(t => !t.done?.[selectedDate] && !t.repeat).length;
          if (undoneCount === 0) return null;
          const nextDayIsToday = addDays(selectedDate, 1) === todayStr();
          return (
            <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 18 }}>
              <button
                onClick={() => setMoveAllConfirm(true)}
                style={{
                  border: "none", background: "none", padding: "8px 4px",
                  color: "#888", fontSize: 13, fontWeight: 600,
                  cursor: "pointer", WebkitTapHighlightColor: "transparent",
                }}
              >
                {undoneCount} incomplete → {nextDayIsToday ? "오늘" : "내일"}
              </button>
            </div>
          );
        })()}
      </div>
      <BottomSheet open={!!(sheet && !sheet.title)} onClose={() => setSheet(null)} title="새 할 일">
        {sheet && !sheet.title && <TodoForm initial={{ categoryId: sheet.categoryId }} onSave={addTodo} onClose={() => setSheet(null)} />}
      </BottomSheet>
      <BottomSheet open={!!(sheet && sheet.title)} onClose={() => setSheet(null)} title="할 일 수정">
        {sheet && sheet.title && <TodoForm initial={sheet} onSave={(data) => saveTodo(sheet, data)} onClose={() => setSheet(null)} />}
      </BottomSheet>
      <BottomSheet open={!!actionMenu} onClose={() => setActionMenu(null)} title="옵션">
        {actionMenu && (
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <ActionBtn icon={<ABIconEdit />} label="수정" onClick={() => { const t = actionMenu.todo; setActionMenu(null); setTimeout(() => setSheet(t), 0); }} />
            <ActionBtn icon={<ABIconTrash color="#E07B7B" />} label="삭제" onClick={() => deleteTodo(actionMenu.todo)} color="#E07B7B" />
            {!actionMenu.todo.repeat && <ActionBtn icon={<ABIconCalendar />} label="날짜 변경" onClick={() => { const t = actionMenu.todo; setActionMenu(null); setTimeout(() => setDateChangeMenu({ todo: t, picked: selectedDate }), 0); }} />}
            {!actionMenu.todo.repeat && (
              selectedDate !== todayStr() && selectedDate !== addDays(todayStr(), -1)
                ? <ActionBtn icon={<ABIconArrowRight />} label="오늘로 이동" onClick={() => moveToToday(actionMenu.todo)} />
                : <ActionBtn icon={<ABIconArrowRight />} label="내일로 이동" onClick={() => moveNextDay(actionMenu.todo)} />
            )}
            {actionMenu.todo.done?.[selectedDate] && <ActionBtn icon={<ABIconArrowRight />} label="오늘 다시 하기" onClick={() => repeatToday(actionMenu.todo)} />}
            <ActionBtn icon={<ABIconArchive />} label="보관함으로 이동" onClick={() => archiveTodo(actionMenu.todo)} />
          </div>
        )}
      </BottomSheet>
      <BottomSheet open={!!dateChangeMenu} onClose={() => setDateChangeMenu(null)} title="날짜 변경">
        {dateChangeMenu && (
          <div>
            <div style={{ margin: "0 -16px" }}>
              <MonthCalendar
                selectedDate={dateChangeMenu.picked}
                onSelect={(d) => setDateChangeMenu(prev => ({ ...prev, picked: d }))}
                forceExpanded
              />
            </div>
            <button
              onClick={() => changeTodoDate(dateChangeMenu.todo, dateChangeMenu.picked)}
              style={{
                width: "100%", marginTop: 8, padding: 14, borderRadius: RADIUS_MD, border: "none",
                background: "#111", color: "#fff", fontWeight: 700, fontSize: 16, cursor: "pointer",
              }}
            >
              Confirm
            </button>
          </div>
        )}
      </BottomSheet>
      <BottomSheet open={!!deleteConfirm} onClose={() => setDeleteConfirm(null)} title="반복 할 일 삭제">
        {deleteConfirm && (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <ActionBtn label="이 항목만 삭제" onClick={() => doDelete(deleteConfirm.todo, false)} />
            <ActionBtn label="이 항목과 이후 모든 항목 삭제" onClick={() => doDelete(deleteConfirm.todo, true)} color="#E07B7B" />
          </div>
        )}
      </BottomSheet>
      <BottomSheet open={!!editConfirm} onClose={() => setEditConfirm(null)} title="반복 할 일 수정">
        {editConfirm && (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <ActionBtn label="이 항목만 수정" onClick={() => doEdit(editConfirm.todo, editConfirm.data, false)} />
            <ActionBtn label="이 항목과 이후 모든 항목 수정" onClick={() => doEdit(editConfirm.todo, editConfirm.data, true)} />
          </div>
        )}
      </BottomSheet>
      <BottomSheet open={moveAllConfirm} onClose={() => setMoveAllConfirm(false)} title={`미완료 할 일을 ${addDays(selectedDate, 1) === todayStr() ? "오늘" : "내일"}로 이동`}>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ fontSize: 14, color: "#555", lineHeight: 1.6, padding: "2px 0 6px" }}>
            오늘의 미완료 할 일: <b>{dayTodosAll.filter(t => !t.done?.[selectedDate] && !t.repeat).length}</b><br />
            {addDays(selectedDate, 1) === todayStr() ? "오늘로" : `내일(${addDays(selectedDate, 1).slice(5).replace("-", "/")})로`} 이동할까요?<br />
            <span style={{ fontSize: 12, color: "#aaa" }}>※ 반복 할 일은 제외됩니다</span>
          </div>
          <ActionBtn icon={<ABIconArrowRight />} label={`${addDays(selectedDate, 1) === todayStr() ? "오늘" : "내일"}로 이동`} onClick={moveAllUndoneTomorrow} />
        </div>
      </BottomSheet>
    </div>
  );
}

// ─── CategoryDragList ─────────────────────────────────────────────
const CategoryDragList = memo(function CategoryDragList({ cat, catUndone, catDone, selectedDate, onAdd, onToggle, onAction, crossDrag }) {
  const isDragging = !!crossDrag.dragging;
  const doneZoneId = cat.id + DONE_ZONE_SUFFIX;
  // Whether the currently-dragged item originated in *this* category's undone
  // list, vs its completed list — the two lists are separate drag zones (see
  // DONE_ZONE_SUFFIX), so each needs its own "am I the origin/target" flags.
  // The ghost row / insertion line only render inside the zone a drag
  // actually started in, so nothing appears duplicated across zones.
  const draggedFromHere = isDragging && crossDrag.dragging.catId === cat.id;
  const isDropTarget = isDragging && crossDrag.over?.catId === cat.id;
  const draggedFromDone = isDragging && crossDrag.dragging.catId === doneZoneId;
  const isDoneDropTarget = isDragging && crossDrag.over?.catId === doneZoneId;
  const flipRef = useFlipList([...catUndone, ...catDone].map(t => t.id), isDragging);

  return (
    <div style={{ marginBottom: 14 }} data-cat-id={cat.id}>
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        background: isDropTarget ? hexToRgba(cat.color, 0.16) : "#f0f0f0", borderRadius: 22, padding: "4px 4px 4px 12px", marginBottom: 8,
        boxShadow: isDropTarget ? `inset 0 0 0 1.5px ${cat.color}` : "none",
        transition: "background 0.12s ease-out, box-shadow 0.12s ease-out",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ width: 10, height: 10, borderRadius: "50%", background: cat.color, flexShrink: 0 }} />
          <span style={{ fontSize: 13, fontWeight: 800, color: cat.color }}>{cat.label}</span>
        </div>
        {/* 완료된 카테고리는 더 이상 할 일을 추가할 수 없도록 + 버튼을 숨긴다.
            기존에 들어있던 할 일들은 그대로 목록에 남아 보인다. */}
        {!cat.completed && (
          <button onClick={onAdd} style={{
            width: 26, height: 26, borderRadius: "50%", border: "none",
            background: "#fff", color: "#222",
            cursor: "pointer", lineHeight: 1,
            display: "flex", alignItems: "center", justifyContent: "center",
            boxShadow: "0 1px 2px rgba(0,0,0,0.06)",
          }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 1.5V12.5M1.5 7H12.5" stroke="#222" strokeWidth="2.2" strokeLinecap="round" />
            </svg>
          </button>
        )}
      </div>
      {catUndone.length === 0 && catDone.length === 0 && (
        <div style={{ height: isDropTarget ? 28 : 10, transition: "height 0.12s ease-out" }} />
      )}
      {isDragging && draggedFromHere && (
        <div style={{ fontSize: 11, color: isDropTarget ? cat.color : "#aaa", textAlign: "center", marginBottom: 4, fontWeight: isDropTarget ? 700 : 400 }}>
          {"여기서 순서 변경"}
        </div>
      )}
      <div style={{ touchAction: "pan-y" }}>
        {catUndone.map((todo, idx) => {
          const isGrabbed = draggedFromHere && crossDrag.dragging.id === todo.id;
          const showLineBefore = isDropTarget && crossDrag.over.index === idx && !isGrabbed;
          const dy = isGrabbed ? crossDrag.dragging.currentY - crossDrag.dragging.startY : 0;
          // Repeating todos can be reordered by dragging too, but only the
          // position for *this* occurrence (selectedDate) is changed —
          // stored separately from the recurring todo's other days — so
          // moving one here never affects its order on other dates. Cross-
          // category moves stay disabled for everyone above.
          const dragHandlers = crossDrag.handlers(todo.id, cat.id, idx);
          return (
            <div key={todo.id}
              ref={flipRef(todo.id)}
              data-drag-id={todo.id}
              style={{
                display: "flex", flexDirection: "column", padding: "8px 0",
                borderTop: showLineBefore ? `2px solid ${cat.color}` : "2px solid transparent",
                borderBottom: "1px solid #f5f5f5",
                transform: isGrabbed ? `translateY(${dy}px)` : "none",
                zIndex: isGrabbed ? 50 : 1,
                position: isGrabbed ? "relative" : "static",
                background: isGrabbed ? "#fafafa" : "transparent",
                borderRadius: isGrabbed ? 10 : 0,
                boxShadow: isGrabbed ? "0 4px 18px rgba(0,0,0,0.10)" : "none",
                opacity: isGrabbed ? 0.97 : 1,
                pointerEvents: isGrabbed ? "none" : "auto",
                transition: "border-color 0.12s ease-out, background 0.12s ease-out, box-shadow 0.12s ease-out",
                userSelect: "none",
              }}
              {...dragHandlers}
            >
              <div style={{ display: "flex", flexDirection: "column" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{
                    width: 16, display: "flex", alignItems: "center", justifyContent: "center",
                    flexShrink: 0, opacity: isDragging && isGrabbed ? 1 : 0.2,
                    fontSize: 14, color: "#888", cursor: "grab",
                  }}>⠿</div>
                  <div onClick={(e) => { if (isDragging) return; e.stopPropagation(); onToggle(todo); }} style={{
                    width: 22, height: 22, borderRadius: "50%", border: `2px solid ${cat.color}`,
                    background: "transparent", flexShrink: 0, cursor: "pointer",
                  }} />
                  <div style={{ flex: 1, minWidth: 0, display: "flex", alignItems: "flex-start" }} onClick={() => { if (isDragging) return; onAction(todo); }}>
                    <span style={{ fontSize: 17, color: "#111", fontWeight: 500, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", minWidth: 0 }}>{todo.title}</span>
                    {todo.important && (
                      <span style={{
                        width: 6, height: 6, borderRadius: "50%", background: IMPORTANT_DOT_COLOR,
                        flexShrink: 0, marginLeft: 4, marginTop: -3,
                      }} />
                    )}
                  </div>
                </div>
                {(todo.memo || todo.hasTime) && (
                  <div style={{ display: "flex", gap: 10 }} onClick={() => { if (isDragging) return; onAction(todo); }}>
                    <div style={{ width: 16, flexShrink: 0 }} />
                    <div style={{ width: 22, flexShrink: 0 }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      {todo.memo && <div style={{ fontSize: 12, color: "#999", marginTop: 2, whiteSpace: "pre-wrap" }}>{todo.memo}</div>}
                      {todo.hasTime && (
                        <div style={{ fontSize: 11, color: "#aaa", marginTop: 2 }}>
                          {pad(todo.startH)}:{pad(todo.startM)}{todo.endH != null && ` – ${pad(todo.endH)}:${pad(todo.endM)}`}
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        })}
        {isDropTarget && crossDrag.over.index >= catUndone.length && (
          <div style={{ height: 2, background: cat.color, borderRadius: 1, margin: "2px 0" }} />
        )}
      </div>
      {isDragging && draggedFromDone && (
        <div style={{ fontSize: 11, color: isDoneDropTarget ? cat.color : "#aaa", textAlign: "center", margin: "4px 0", fontWeight: isDoneDropTarget ? 700 : 400 }}>
          {"여기서 순서 변경"}
        </div>
      )}
      <div style={{ touchAction: "pan-y" }} data-cat-id={doneZoneId}>
        {catDone.map((todo, idx) => {
          const isGrabbed = draggedFromDone && crossDrag.dragging.id === todo.id;
          const showLineBefore = isDoneDropTarget && crossDrag.over.index === idx && !isGrabbed;
          const dy = isGrabbed ? crossDrag.dragging.currentY - crossDrag.dragging.startY : 0;
          // Completed todos reorder among themselves the same way undone
          // ones do, just within their own drag zone (doneZoneId) so a drag
          // here can never land among the undone items above.
          const dragHandlers = crossDrag.handlers(todo.id, doneZoneId, idx);
          return (
            <div key={todo.id}
              ref={flipRef(todo.id)}
              data-drag-id={todo.id}
              style={{
                display: "flex", flexDirection: "column", padding: "8px 0",
                borderTop: showLineBefore ? `2px solid ${cat.color}` : "2px solid transparent",
                borderBottom: "1px solid #f5f5f5",
                transform: isGrabbed ? `translateY(${dy}px)` : "none",
                zIndex: isGrabbed ? 50 : 1,
                position: isGrabbed ? "relative" : "static",
                background: isGrabbed ? "#fafafa" : "transparent",
                borderRadius: isGrabbed ? 10 : 0,
                boxShadow: isGrabbed ? "0 4px 18px rgba(0,0,0,0.10)" : "none",
                opacity: isGrabbed ? 0.97 : 1,
                pointerEvents: isGrabbed ? "none" : "auto",
                transition: "border-color 0.12s ease-out, background 0.12s ease-out, box-shadow 0.12s ease-out",
                userSelect: "none",
              }}
              {...dragHandlers}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{
                  width: 16, display: "flex", alignItems: "center", justifyContent: "center",
                  flexShrink: 0, opacity: isDragging && isGrabbed ? 1 : 0.2,
                  fontSize: 14, color: "#888", cursor: "grab",
                }}>⠿</div>
                <div onClick={(e) => { if (isDragging) return; e.stopPropagation(); onToggle(todo); }} style={{
                  width: 22, height: 22, borderRadius: "50%", border: `2px solid ${cat.color}`,
                  background: cat.color, flexShrink: 0, cursor: "pointer",
                }} />
                <div style={{ flex: 1, minWidth: 0, display: "flex", alignItems: "flex-start" }} onClick={() => { if (isDragging) return; onAction(todo); }}>
                  <span style={{ fontSize: 17, color: "#bbb", textDecoration: "line-through", fontWeight: 500, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", minWidth: 0 }}>{todo.title}</span>
                  {todo.important && (
                    <span style={{
                      width: 6, height: 6, borderRadius: "50%", background: IMPORTANT_DOT_COLOR,
                      flexShrink: 0, marginLeft: 4, marginTop: -3,
                    }} />
                  )}
                </div>
              </div>
              {(todo.memo || todo.hasTime) && (
                <div style={{ display: "flex", gap: 10 }} onClick={() => { if (isDragging) return; onAction(todo); }}>
                  <div style={{ width: 16, flexShrink: 0 }} />
                  <div style={{ width: 22, flexShrink: 0 }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    {todo.memo && <div style={{ fontSize: 12, color: "#ccc", marginTop: 2, whiteSpace: "pre-wrap" }}>{todo.memo}</div>}
                    {todo.hasTime && (
                      <div style={{ fontSize: 11, color: "#ddd", marginTop: 2 }}>
                        {pad(todo.startH)}:{pad(todo.startM)}{todo.endH != null && ` – ${pad(todo.endH)}:${pad(todo.endM)}`}
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {isDoneDropTarget && crossDrag.over.index >= catDone.length && (
          <div style={{ height: 2, background: cat.color, borderRadius: 1, margin: "2px 0" }} />
        )}
      </div>
    </div>
  );
});
