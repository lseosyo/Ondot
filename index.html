    const dy = e.changedTouches[0].clientY - touchStartY.current;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) setTab(t => Math.min(2, t + 1));
      else setTab(t => Math.max(0, t - 1));
    }
    touchStartX.current = null;
    touchStartY.current = null;
    touchDidScroll.current = false;
    dragWasActiveThisTouch.current = false;
  }

  const TABS = ["홈", "할 일", "설정"];
  const icons = [
    (a) => <IconHome active={a} />,
    (a) => <IconTodo active={a} />,
    (a) => <IconSettings active={a} size={24} />,
  ];

  // Positions the sync status dot at the horizontal midpoint of the gap
  // between the right (next-date) arrow button and the header's right edge,
  // instead of flush against the edge. The gap's width isn't fixed — it
  // shrinks and grows with the date label's length — so the midpoint is
  // measured from the live DOM rather than hardcoded.
  const headerRef = useRef(null);
  const rightArrowRef = useRef(null);
  const leftArrowRef = useRef(null);
  const [syncDotLeft, setSyncDotLeft] = useState(null);
  const [dotCounterLeft, setDotCounterLeft] = useState(null);
  const HEADER_PAD_RIGHT = 16;
  const HEADER_PAD_LEFT = 16;
  useLayoutEffect(() => {
    function recomputeSyncDotPosition() {
      const header = headerRef.current;
      const arrow = rightArrowRef.current;
      if (!header || !arrow) return;
      const headerRect = header.getBoundingClientRect();
      const arrowRect = arrow.getBoundingClientRect();
      const gapStart = arrowRect.right;
      const gapEnd = headerRect.right - HEADER_PAD_RIGHT;
      const mid = (gapStart + gapEnd) / 2;
      setSyncDotLeft(mid - headerRect.left);
    }
    function recomputeDotCounterPosition() {
      const header = headerRef.current;
      const arrow = leftArrowRef.current;
      if (!header || !arrow) return;
      const headerRect = header.getBoundingClientRect();
      const arrowRect = arrow.getBoundingClientRect();
      const gapStart = headerRect.left + HEADER_PAD_LEFT;
      const gapEnd = arrowRect.left;
      const mid = (gapStart + gapEnd) / 2;
      setDotCounterLeft(mid - headerRect.left);
    }
    recomputeSyncDotPosition();
    recomputeDotCounterPosition();
    window.addEventListener("resize", recomputeSyncDotPosition);
    window.addEventListener("resize", recomputeDotCounterPosition);
    let ro = null;
    if (typeof ResizeObserver !== "undefined" && headerRef.current) {
      ro = new ResizeObserver(() => { recomputeSyncDotPosition(); recomputeDotCounterPosition(); });
      ro.observe(headerRef.current);
    }
    return () => {
      window.removeEventListener("resize", recomputeSyncDotPosition);
      window.removeEventListener("resize", recomputeDotCounterPosition);
      if (ro) ro.disconnect();
    };
  }, [sharedDate, tab, calendarFolded]);

  return (
    <div style={{
      width: "100%", height: "100dvh", display: "flex", flexDirection: "column",
      background: "#fff", fontFamily: "system-ui, sans-serif",
      paddingTop: "env(safe-area-inset-top, 0px)",
      boxSizing: "border-box", overflow: "hidden", position: "relative"
    }}
      onTouchStart={onTouchStart}
      onTouchMove={onTouchMove}
      onTouchEnd={onTouchEnd}
    >
      {(
        /* Header: "N닷" point counter(left, To-do tab) · date(absolute center) · Settings(right) */
        <div ref={headerRef} style={{
          position: "relative", display: "flex", alignItems: "center",
          padding: "12px 16px 8px", flexShrink: 0, height: 76,
        }}>

          {/* Left: "N닷" point counter — centered in the gap between the left
              arrow and the header's left edge, mirroring the sync dot's
              positioning on the right side. */}
          <div style={{
            position: "absolute",
            left: dotCounterLeft != null ? dotCounterLeft : 16,
            top: "50%",
            transform: dotCounterLeft != null ? "translate(-50%, -50%)" : "translateY(-50%)",
            zIndex: 1, flexShrink: 0,
          }}>
            <span style={{ fontWeight: 700, fontSize: 14, color: "#111", whiteSpace: "nowrap" }}>닷 {dotPoints}개</span>
          </div>

          {/* Center: date — absolutely centered regardless of side button widths */}
          <div style={{
            position: "absolute", left: 0, right: 0, top: 0, bottom: 0,
            display: "flex", alignItems: "center", justifyContent: "center",
            pointerEvents: "none",
          }}>
            <div style={{ position: "relative", display: "flex", alignItems: "center", gap: 10, pointerEvents: "auto" }}>
              <button onClick={() => {
                if (tab === 1 && !calendarFolded) {
                  // To-do tab month view: go to the 1st of the previous month
                  const d = dateFromStr(sharedDate);
                  const first = new Date(d.getFullYear(), d.getMonth() - 1, 1);
                  setSharedDate(`${first.getFullYear()}-${pad(first.getMonth() + 1)}-01`);
                } else if (tab === 1 && calendarFolded) {
                  // To-do tab week view: move to the same weekday of the previous week, then snap to that week's Sunday
                  const moved = addDays(sharedDate, -7);
                  const dow = dateFromStr(moved).getDay();
                  setSharedDate(addDays(moved, -dow));
                } else {
                  setSharedDate(addDays(sharedDate, -1));
                }
              }} ref={leftArrowRef} style={{ ...arrowBtn, display: "flex", alignItems: "center", flexShrink: 0 }}><IconChevronLeft /></button>
              <div style={{ display: "flex", alignItems: "center" }}>
                <span style={{ fontWeight: 700, fontSize: 16, whiteSpace: "nowrap" }}>{formatDateLabelKR(sharedDate)}</span>
              </div>
              {sharedDate !== todayStr() && (
                <button onClick={() => setSharedDate(todayStr())} style={{
                  position: "absolute", top: "100%", left: "50%", transform: "translateX(-50%)",
                  marginTop: 6, padding: "2px 10px", borderRadius: RADIUS_PILL,
                  border: "1.5px solid #ddd", background: "#fff", color: "#555",
                  fontSize: 10, fontWeight: 600, cursor: "pointer", lineHeight: 1.4,
                  WebkitTapHighlightColor: "transparent", whiteSpace: "nowrap", zIndex: 10,
                }}>오늘</button>
              )}
              <button onClick={() => {
                if (tab === 1 && !calendarFolded) {
                  // To-do tab month view: go to the 1st of the next month
                  const d = dateFromStr(sharedDate);
                  const first = new Date(d.getFullYear(), d.getMonth() + 1, 1);
                  setSharedDate(`${first.getFullYear()}-${pad(first.getMonth() + 1)}-01`);
                } else if (tab === 1 && calendarFolded) {
                  // To-do tab week view: move to the same weekday of the next week, then snap to that week's Sunday
                  const moved = addDays(sharedDate, 7);
                  const dow = dateFromStr(moved).getDay();
                  setSharedDate(addDays(moved, -dow));
                } else {
                  setSharedDate(addDays(sharedDate, 1));
                }
              }} ref={rightArrowRef} style={{ ...arrowBtn, display: "flex", alignItems: "center", flexShrink: 0 }}><IconChevronRight /></button>
            </div>
          </div>

          {/* Right: sync status — centered in the gap between the right
              arrow and the header's right edge (see syncDotLeft above),
              rather than flush against the edge. */}
          <div style={{
            position: "absolute",
            left: syncDotLeft != null ? syncDotLeft : undefined,
            right: syncDotLeft != null ? undefined : 16,
            top: "50%",
            transform: syncDotLeft != null ? "translate(-50%, -50%)" : "translateY(-50%)",
            zIndex: 1, flexShrink: 0, display: "flex", alignItems: "center", gap: 6,
          }}>
            <SyncStatusDot syncUrl={syncUrl} syncStatus={syncStatus} size={8} />
          </div>

        </div>
      )}

      {/* Content — all three panels stay mounted side by side in a track;
          switching tabs just slides the track with a CSS transition instead
          of instantly toggling display:none/flex, so the tab change (both
          from tapping the tab bar and from the swipe gesture above) animates
          smoothly. */}
      <div style={{ flex: 1, minHeight: 0, overflow: "hidden", position: "relative" }}>
        <div style={{
          display: "flex", width: "300%", height: "100%",
          transform: `translateX(-${tab * (100 / 3)}%)`,
          transition: "transform 0.32s cubic-bezier(0.4,0,0.2,1)",
        }}>
          <div style={{ width: "33.3333%", flexShrink: 0, height: "100%", display: "flex", flexDirection: "column", overflow: "hidden", pointerEvents: tab === 0 ? "auto" : "none" }}>
            <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", overflowY: "auto", overflowX: "hidden", WebkitOverflowScrolling: "touch", position: "relative" }}>
              {homeImage ? (() => {
                const key = homeImage.name;
                const revealed = revealedCounts[key] || 0;
                const total = totalCellCountFromName(homeImage.name);
                const remaining = total != null ? Math.max(0, total - revealed) : Infinity;
                const isDone = total != null && remaining === 0;
                const canUse = dotPoints > 0 && !isDone;
                const useAmt = Math.min(dotPoints, remaining === Infinity ? dotPoints : remaining);
                const useDots = () => {
                  const amt = useAmt;
                  if (amt <= 0) return;
                  setRevealedCounts(prev => ({ ...prev, [key]: revealed + amt }));
                  addDotPoints(-amt);
                };
                return (
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
                    <PixelRevealCanvas src={homeImage.src} revealedCount={revealed} width={160} />
                    <span style={{ fontSize: 13, fontWeight: 600, color: "#666" }}>{homeImage.name.replace(/\s*\(\d+\)\s*$/, "")}</span>
                    <span style={{ fontSize: 12, color: "#aaa" }}>({revealed}/{total ?? "?"})</span>
                    <button
                      onClick={useDots}
                      disabled={!canUse}
                      style={{
                        fontSize: 12, fontWeight: 600, color: canUse ? "#111" : "#bbb",
                        padding: "6px 14px", borderRadius: 999, border: "1px solid #ddd",
                        background: "#fafafa", cursor: canUse ? "pointer" : "default",
                        WebkitTapHighlightColor: "transparent",
                      }}>
                      {isDone ? "완료" : `${useAmt}닷 사용`}
                    </button>
                  </div>
                );
              })() : (
                <span style={{ fontSize: 13, color: "#bbb" }}>아직 선택된 이미지가 없습니다.</span>
              )}
            </div>
          </div>
          <div style={{ width: "33.3333%", flexShrink: 0, height: "100%", display: "flex", flexDirection: "column", overflow: "hidden", position: "relative", pointerEvents: tab === 1 ? "auto" : "none" }}>
            <TodoTab todos={todosForTab(todoDate)} setTodos={setTodos} selectedDate={todoDate} setSelectedDate={setTodoDate} onSheetChange={setSheetOpen} dateTodos={dateTodos} repeatTodos={repeatTodos} calendarFolded={calendarFolded} setCalendarFolded={setCalendarFolded} onDotChange={addDotPoints} />
          </div>
          {/* Setting tab: 기존에 우측 상단 톱니바퀴 드롭다운에 있던 설정 메뉴들을 탭 안으로 옮김.
              배경 없이 흰 바탕에 텍스트만 두고, 항목 사이는 얇은 검은 선으로만 구분한다. */}
          <div style={{ width: "33.3333%", flexShrink: 0, height: "100%", display: "flex", flexDirection: "column", overflow: "hidden", position: "relative", pointerEvents: tab === 2 ? "auto" : "none" }}>
            <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column", overflowY: "auto", padding: "20px 16px", background: "#fff" }}>
              <button onClick={() => setCategorySettingsOpen(true)} style={settingsMenuBtn}>
                카테고리 설정
              </button>
              <button onClick={() => setCompletedCategoryOpen(true)} style={settingsMenuBtn}>
                완료된 카테고리 보기
              </button>
              <button onClick={() => setSyncSettingsOpen(true)} style={settingsMenuBtn}>
                동기화 설정
              </button>
              <button
                onPointerDown={startArchivePress}
                onPointerUp={cancelArchivePress}
                onPointerLeave={cancelArchivePress}
                onPointerCancel={cancelArchivePress}
                onContextMenu={(e) => e.preventDefault()}
                style={{
                  ...settingsMenuBtn,
                  background: archivePressed ? "#f5f5f5" : "#fff",
                  transition: "background 0.15s",
                  userSelect: "none", WebkitUserSelect: "none",
                  WebkitTouchCallout: "none", touchAction: "manipulation",
                }}
              >
                보관함 {archivePressed && <span style={{ fontSize: 12, fontWeight: 500, color: "#999" }}>꾹 누르는 중…</span>}
              </button>
              <button onClick={() => setAlbumOpen(true)} style={{ ...settingsMenuBtn, borderBottom: "none" }}>
                앨범
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* Bottom Nav */}
      <div style={{
        display: "flex", borderTop: "1px solid #f0f0f0",
        paddingBottom: "env(safe-area-inset-bottom, 0px)",
        background: "#fff", flexShrink: 0, zIndex: 100
      }}>
        {TABS.map((label, i) => (
          <button key={i} onClick={() => { if (!sheetOpen) setTab(i); }} style={{
            flex: 1, padding: "14px 0", border: "none", background: "none",
            display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
            WebkitTapHighlightColor: "transparent",
          }}>
            {icons[i](tab === i)}
          </button>
        ))}
      </div>

      <CategorySettingsSheet
        open={categorySettingsOpen}
        onClose={() => setCategorySettingsOpen(false)}
        categories={categories}
        onAdd={addCategory}
        onUpdateTitle={updateCategoryTitle}
        onUpdateColor={updateCategoryColor}
        onDelete={deleteCategory}
        onComplete={completeCategory}
        getTodoCount={countTodosForCategory}
      />
      <SyncSettingsSheet
        open={syncSettingsOpen}
        onClose={() => setSyncSettingsOpen(false)}
        syncUrl={syncUrl}
        syncStatus={syncStatus}
        syncBusy={syncBusy}
        syncError={syncError}
        lastSyncedAt={lastSyncedAt}
        onConnect={connectSyncUrl}
        onDisconnect={disconnectSync}
        onManualSync={manualSync}
      />
      {/* 완료 카테고리 보기: "완료" 처리된 카테고리만 모아 보여준다.
          되돌리기(완료 취소) 등 추가 동작은 아직 미정 — 지금은 보기만 가능. */}
      <BottomSheet open={completedCategoryOpen} onClose={() => setCompletedCategoryOpen(false)} title="완료된 카테고리 보기">
        {(() => {
          const completed = categories.filter(c => c.completed);
          if (completed.length === 0) {
            return (
              <div style={{ padding: "24px 4px", textAlign: "center", color: "#999", fontSize: 13 }}>
                완료된 카테고리가 없습니다.
              </div>
            );
          }
          return (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {completed.map(c => (
                <div key={c.id} style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: "8px 10px", borderRadius: RADIUS_SM, border: "1.5px solid #eee",
                  background: "#fafafa",
                }}>
                  <span style={{
                    width: 22, height: 22, borderRadius: 11, flexShrink: 0,
                    background: c.color || "#fff",
                  }} />
                  <span style={{ flex: 1, fontSize: 15, fontWeight: 600, color: "#999" }}>{c.label}</span>
                </div>
              ))}
            </div>
          );
        })()}
      </BottomSheet>
      <ArchiveScreen open={archiveOpen} onClose={() => setArchiveOpen(false)} todos={getAllTodosFlat()} setTodos={setTodos} />
      {/* 앨범: 아직 기능 미구현 — 빈 페이지 placeholder만 존재 */}
      <AlbumScreen
        open={albumOpen}
        onClose={() => setAlbumOpen(false)}
        revealedCounts={revealedCounts}
        selectedName={homeImage?.name}
        onDeselect={() => setHomeImage(null)}
        onSelect={(photo) => {
          setHomeImage(photo);
          setAlbumOpen(false);
          setTab(0);
        }}
      />
    </div>
  );
}

const rootEl = document.getElementById("root");
const root = ReactDOM.createRoot(rootEl);
root.render(<App />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
